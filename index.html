const etablissements = [
{ nom: "Albert-Chenevier", lat: 48.78905, lng: 2.46130, ouverture: 1959, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FACH%2FFRAPHP075_ACH_3FI4_024.jpg",  legende_image:"Entrée de l'hôpital en 1977.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Albert-Chenevier.pdf", histoire: "En <b>1970</b>, fusionne avec l'hôpital de Créteil pour former le groupe hospitalier Henri-Mondor – Albert-Chenevier." , groupe: "groupe hospitalier Henri-Mondor - Albert-Chenevier", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Ambroise-Paré", lat: 48.84947, lng: 2.23567, ouverture: 1923, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FAPR%2FFRAPHP075_APR_3FI4_0278.jpg",  legende_image:"Cour d'entrée de l'hôpital en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Ambroise-Pare.pdf", histoire: "En <b>1923</b>, l'hôpital de Boulogne ouvre le 1er novembre à Boulogne-Billancourt.\n\nEn <b>1924</b>, par décret du 18 mars, il prend le nom d'hôpital Ambroise-Paré, en hommage au chirurgien Ambroise Paré (1509-1590).\n\nEn <b>1943</b>, l'administration engage le projet de reconstruction de l'établissement.\n\nEn <b>1962</b>, le 7 février, l'AP-HP acquiert un terrain de six hectares du domaine du Bailgü. Les travaux débutent en décembre 1965 sous la direction des architectes Théodon, Lemaresquier et Lebret.\n\nEn <b>1969</b>, le nouvel hôpital Ambroise-Paré est achevé et ouvert au public." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Antoine-Béclère", lat: 48.78869, lng: 2.25464, ouverture: 1971, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F14FI%2FFRAPHP075_14FI_092.jpg",  legende_image:"Entrée principale par la rue de la porte de Trivaux, 1973.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Antoine-Beclere.pdf", histoire: "En <b>1963</b>, l'étude de l'hôpital de Clamart est lancée.\n\nEn <b>1970</b>, bien avant sa mise en service, l'établissement reçoit la dénomination d'hôpital Antoine-Béclère, du nom du fondateur de la radiologie française (1856-1939). Conçu par l'architecte Henri Pottier, il est édifié de 1967 à 1971." , groupe: "", specialites: "Procréation médicalement assistée (PMA), maternité type III, pneumologie, cardiologie", decouverte_1: "Premier bébé éprouvette de France (Amandine) | 1982 | Pr Jacques Testart & Dr René Frydman", decouverte_2: "" },
{ nom: "Armand-Trousseau", lat: 48.84222, lng: 2.40556, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F54FI%2FFRAPHP075_54FI_091.jpg",  legende_image:"Entrée de l'hôpital en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "En <b>1901</b>, le nouvel hôpital Trousseau entre en service le 15 mars, reconstruit par les architectes Maistrasse et Berger au 26 avenue du Dr Arnold Netter dans le 12e arrondissement de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Asile Saint-Ferdinand", lat: 48.84861, lng: 2.37576, ouverture: 1847, fermeture: 1848, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1847</b>, l'administration consacre une partie des locaux de l'Hôtel-Dieu annexe à l'accueil de vieillards, baptisés asile Saint-Ferdinand, en hommage au duc d'Orléans, fils du roi Louis-Philippe.\n\nEn <b>1848</b>, supprimé le 12 octobre, les pensionnaires sont transférés vers l'hospice de La Rochefoucauld. L'établissement prend alors le nom d'hôpital Sainte-Marguerite." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Aubervilliers (hôpital temporaire d’)", lat: 48.89880, lng: 2.33185, ouverture: 1884, fermeture: 1904, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_008.jpg",  legende_image:"L'hôpital temporaire vers 1884-1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/43_Claude-Bernard.pdf", histoire: "En <b>1884</b>, l'hôpital temporaire d'Aubervilliers ouvre le 20 novembre le long des fortifications au nord de Paris pour accueillir les convalescents des hôpitaux parisiens.\n\nEn <b>1901</b>, un projet de reconstruction est adopté.\n\nEn <b>1904</b>, les anciens baraquements sont incendiés le 12 juillet.\n\nEn <b>1905</b>, le nouvel établissement reconstruit sur les plans de François Renaud prend le nom d'hôpital Claude-Bernard et est inauguré le 30 novembre." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Avicenne", lat: 48.9095, lng:  2.5009, ouverture: 1979, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F15FI%2FFRAPHP075_15FI_004.jpg",  legende_image:"Entrée de l'hôpital en 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Avicenne.pdf", histoire: "En <b>1931</b>, débute la construction de l'hôpital franco-musulman à Bobigny par les architectes Mantout et Azéma, relevant de la préfecture de la Seine.\n\nEn <b>1935</b>, inauguré en mars, l'établissement entre en fonctionnement le 2 mai.\n\nEn <b>1979</b>, l'administration lui attribue le nom d'hôpital Avicenne, en mémoire d'Abou Ali Al Husayn Ibn Sina dit Avicenne (980-1037), originaire du Turkestan." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Beaujon Clichy", lat: 48.90836, lng: 2.30821, ouverture: 1935, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBJN%2FFRAPHP075_BJN_3FI4_0077.jpg",  legende_image:"Entrée et loge du concierge en 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/18_Beaujon-Clichy.pdf", histoire: "En <b>1930</b>, un concours est ouvert le 9 août pour remplacer l'hôpital Beaujon à Paris, devenu vétuste.\n\nEn <b>1932</b>, les travaux débutent à Clichy sous la direction de MM. Plousey, Cassan et Jean Walter. Premier hôpital vertical non pavillonnaire monobloc de France, avec ses douze étages." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Berck-sur-mer (hôpital maritime de)", lat: 50.40180, lng: 1.55744, ouverture: 1861, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F16FI%2FFRAPHP075_16FI_041.jpg",  legende_image:"Galeries de cure d'air en 1951.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/21_Berck.pdf", histoire: "En <b>1861</b>, un premier hôpital expérimental est établi sous forme de baraquements de bois sur la plage pour soigner des enfants atteints de rachitisme et d'affections scrofuleuses.\n\nEn <b>1867</b>, un établissement plus vaste est construit sur les plans de l'architecte Émile Lavezzari.\n\nEn <b>1869</b>, inauguré le 8 juillet par l'impératrice Eugénie de Montijo, l'établissement prend le nom d'hôpital Napoléon et compte près de 500 lits.\n\nEn <b>1870</b>, renommé hôpital maritime de la Ville de Paris. Les bâtiments sont agrandis et reconstruits entre 1894 et 1910, portant la capacité à plus de 1 000 lits.\n\nEn <b>1961</b>, l'établissement prend la dénomination d'hôpital maritime de Berck, spécialisé en chirurgie orthopédique et restauration motrice." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Bicêtre", lat: 48.80988, lng: 2.35321, ouverture: 1885, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBCT%2FFRAPHP075_BCT_3FI4_0130.jpg",  legende_image:"Entrée principale vue de la cour intérieure en 1964.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bicêtre.pdf", histoire: "En <b>1885</b>, l'établissement reprend son ancienne dénomination et redevient Bicêtre.\n\nEn <b>1950</b>, l'hospice est transformé en hôpital de soins pour aigus.\n\nEn <b>1952</b>, deux pavillons sont modernisés et aménagés en hôpital pour enfants." , groupe: "", specialites: "Neurologie, neurochirurgie, chirurgie vasculaire, immunopathologie, maternité type III", decouverte_1: "Localisation du centre du langage (aire de Broca) | 1861 | Pr Paul Broca", decouverte_2: "" },
{ nom: "Bichat", lat: 48.89957, lng: 2.33228, ouverture: 1882, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBCH%2FFRAPHP075_BCH_3FI4_0326.jpg",  legende_image:"Entrée de l'hôpital en 1990.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/23_Bichat.pdf", histoire: "Ancien poste caserne du bastion 39.\n\nEn <b>1988</b>, rattaché au groupe hospitalier Bichat-Claude-Bernard." , groupe: "groupe hospitalier Bichat–Claude-Bernard", specialites: "Cardiologie, maladies infectieuses et tropicales, neurologie, pneumologie, urgences, greffes d'organe", decouverte_1: "Premier service de réanimation respiratoire en France (traitement de la poliomyélite) | 1954 | Pr Pierre Mollaret", decouverte_2: "" },
{ nom: "Bigottini ", lat: 48.93015, lng: 2.50282, ouverture: 1906, fermeture: 1970, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F17FI%2FFRAPHP075_17FI_02.jpg",  legende_image:"Entrée de l'hôpital en 1978.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bigottini.pdf", histoire: "En <b>1903</b>, l'abbé Dumont donne à l'administration une propriété à Aulnay-sous-Bois en vue de l'aménagement d'un hospice.\n\nEn <b>1906</b>, l'établissement ouvre le 1er juin sous le nom de maison de retraite Bigottini, grâce aux legs du baron Alphonse de Rothschild et de François Bigottini.\n\nEn <b>1970</b>, par arrêté ministériel du 20 août, rattaché à l'hôpital René-Muret de Sevran, prend la dénomination d'hôpital René-Muret – Bigottini.\n\nEn <b>2019</b>, intègre le groupe AP-HP Hôpitaux universitaires Paris Seine-Saint-Denis." , groupe: "groupe hospitalier René-Muret-Bigottini", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Bretonneau", lat: 48.89025, lng:  2.32994, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F19FI%2FFRAPHP075_19FI_297.jpg",  legende_image:"Entrée de l'hôpital, rue Carpeaux en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/32_Bretonneau.pdf", histoire: "En <b>1988</b>, fermeture de l'établissement ; les activités pédiatriques sont transférées à l'hôpital Robert-Debré.\n\nEn <b>2001</b>, rouvre à vocation gérontologique. Accueille également un centre d'odontologie." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Brévannes (hospice de)", lat: 48.74852, lng: 2.4853, ouverture: 1885, fermeture: 1950, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F26FI%2FFRAPHP075_26FI_044.jpg",  legende_image:"Pavillon des services généraux en 1933.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/55_Emile-Roux.pdf", histoire: "En <b>1883</b>, le 19 septembre, l'Assistance publique achète au baron Hottinger une propriété à Limeil-Brévannes composée d'un château, de dépendances et d'un parc.\n\nEn <b>1885</b>, les premiers patients sont accueillis le 29 juillet, principalement des vieillards veufs, célibataires et en couple.\n\nEn <b>1896-1899</b>, création d'un quartier pour malades chroniques, suivi d'un sanatorium pour adultes tuberculeux (1907) et d'un hospice pour enfants convalescents (1908).\n\nEn <b>1950</b>, par décret du 18 octobre, l'ensemble des pavillons de Brévannes est renommé centre hospitalier Émile-Roux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Broca", lat: 48.83436, lng: 2.34740, ouverture: 1893, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBRC%2FFRAPHP075_BRC_3FI4_0040.jpg",  legende_image:"Entrée en 1969.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/33_Broca.pdf", histoire: "En <b>1834</b>, acquis par le conseil général des hospices.\n\nEn <b>1893</b>, prend le nom d'hôpital Broca. Consultation des services spéciaux : service de gynécologie (Dr Pozzi) ; service des maladies cutanées et syphilitiques." , groupe: "groupe hospitalier Broca-La collégiale", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Chardon-Lagache", lat: 48.84499, lng: 2.26690, ouverture: 1865, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_051.jpg",  legende_image:"L'entrée de la maison de retraite vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/36_Chardon-Lagache.pdf", histoire: "En <b>1858</b>, l'Assistance publique – Hôpitaux de Paris acquiert une parcelle issue de l'ancien village d'Auteuil.\n\nEn <b>1861</b>, par acte de donation du 26 mai, les époux Chardon-Lagache fondent une maison de retraite sur cette parcelle.\n\nEn <b>1865</b>, la maison de retraite Chardon-Lagache ouvre ses portes le 24 juillet.\n\nVers <b>1960</b>, intégré au groupe hospitalier Sainte-Périne." , groupe: "groupe hospitalier Sainte Périne-Chardon-Lagache-Rossini-Parent-de-Rosan", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Charles-Foix", lat: 48.80516, lng: 2.39587, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F22FI%2FFRAPHP075_22FI_182.jpg",  legende_image:"Entrée principale en 1976. cote 22/FI/182.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "En <b>1887</b>, l'arrêté préfectoral du 29 octobre attribue à l'établissement la dénomination d'hospice d'Ivry.\n\nEn <b>1912</b>, l'établissement abrite 2 400 lits, et ne cesse de s'agrandir notamment grâce aux fondations Chemin-Delatour et Dheur.\n\nEn <b>1975</b>, renommé hôpital Charles-Foix." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Chemin-Delatour", lat: 48.80516, lng: 2.39587, ouverture: 1900, fermeture: 1916, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F7%2FFRAPHP075_C660_7_052.jpg",  legende_image:"Plan de masse, 1899, cote C660_7_052.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/41_Chemin-Delatour.pdf", histoire: "En <b>1891</b>, le 30 décembre, le décès de Madame Chemin-Delatour conduit l'Assistance publique, sa légataire universelle, à fonder la maison de retraite qu'elle souhaitait créer dans le département de la Seine. Un site est choisi à Ivry, les travaux confiés successivement aux architectes Vibert et Lebrun." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Claude-Bernard", lat: 48.89880, lng: 2.33185, ouverture: 1904, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F23FI%2FFRAPHP075_23FI_054.jpg",  legende_image:"Entrée principale en 1963.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/43_Claude-Bernard.pdf", histoire: "Reconstruit au même emplacement d'après les plans de l'architecte François Renaud, reçoit la dénomination d'hôpital Claude-Bernard.\n\nEn <b>1988</b>, rattaché au groupe hospitalier Bichat-Claude-Bernard." , groupe: "groupe hospitalier Bichat–Claude-Bernard", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Cochin", lat: 48.83670, lng: 2.33945, ouverture: 1780, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_078.jpg",  legende_image:"Hôpital Cochin. Nouveau pavillon. Aquarelle signée A. Lavieille. Cote 76FI_78", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/45_Cochin.pdf", histoire: "En <b>1780</b>, l'hospice Saint-Jacques-du-Haut-Pas est fondé par Jacques-Denis Cochin pour accueillir les pauvres du faubourg Saint-Jacques à Paris.\n\nEn <b>1782</b>, construit sous la direction de Charles-François Viel, ouvre en juin avec 38 lits.\n\nEn <b>1784</b>, prend le nom d'hospice Cochin. En 1793, change deux fois de dénomination : hospice Jacques, puis hospice du Sud.\n\nEn <b>1802</b>, le conseil général des hospices lui restitue le nom d'hôpital Cochin.\n\nEn <b>1902</b>, fusionne avec l'hôpital Ricord (Cochin-Annexe). Reconstruit et étendu de 1908 à 1926.\n\nEn <b>1999</b>, le groupe hospitalier Cochin fusionne en janvier avec le groupe hospitalier Saint-Vincent-de-Paul – La Roche-Guyon." , groupe: "groupe hospitalier Cochin-Port-Royal", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Commanderie de Saint-Louis", lat: 48.80988, lng: 2.35321, ouverture: 1634, fermeture: 1656, type: "hopital", detruit:"",  images:"https://www.musee-collections.aphp.fr/scripts/atlasgate.dll/aphpv2db/wa_vignette?ex=312&psite=APHP",  legende_image:"Hôpital Bicêtre, estampe sur  papier. 1656", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bic%C3%AAtre.pdf", histoire: "Au <b>XVIIe siècle</b>, le roi Louis XIII fait l'achat d'une propriété pour y bâtir un hôpital destiné au soin des soldats invalides.\n\nEn <b>1634</b>, la commanderie de Saint-Louis ouvre ses portes." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Corentin-Celton", lat: 48.82817, lng: 2.27850, ouverture: 1945, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F24FI%2FFRAPHP075_24FI_141.jpg",  legende_image:"Entrée principale de l'hôpital en 1994.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/47_Corentin-Celton.pdf", histoire: "En <b>1554</b>, l'hospice des Petites Maisons est construit rue de la Chaise, sur l'emplacement d'une ancienne maladrerie dépendant de l'abbaye Saint-Germain-des-Prés. Reçoit vieillards, infirmes, mendiants, aliénés, vénériens et teigneux.\n\nEn <b>1945</b>, la maison de retraite des Ménages est renommée Corentin-Celton, en mémoire du résistant et agent du personnel hospitalier fusillé deux ans auparavant." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Dheur", lat: 48.80516, lng: 2.39587, ouverture: 1891, fermeture: 1916, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD858%2FFRAPHP075_D_858_0009.jpg",  legende_image:"Fondation Dheur - Vues des bâtiments. Fin XIXe siècle", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/53_Dheur.pdf", histoire: "En <b>1891</b>, la fondation située à Ivry-sur-Seine ouvre le 25 juillet, grâce au legs d'Alexandre-Victor Dheur à l'Assistance publique, destiné à édifier une maison de retraite pour hommes et femmes indigents.\n\nEn <b>1916</b>, rattachée à l'hospice d'Ivry." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Dupuytren", lat: 48.67605, lng: 2.41291, ouverture: 1904, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/54_Dupuytren.pdf", histoire: "En <b>1967</b>, l'Assistance publique achève la construction d'un nouvel établissement à Draveil (Essonne), édifié selon les plans de MM. Degouy, Durand et Henry, destiné à l'hospitalisation des malades chroniques. L'hôpital Dupuytren entre progressivement en service dès juillet." , groupe: "groupe hospitalier Joffre-Dupuytren", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Emile-Roux", lat: 48.74852, lng: 2.4853, ouverture: 1950, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F26FI%2FFRAPHP075_26FI_254.jpg",  legende_image:"Entrée de l'hôpital en 1993.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/55_Emile-Roux.pdf", histoire: "En <b>1950</b>, le 18 octobre, l'ensemble de l'établissement et des pavillons de Brévannes change de dénomination pour devenir le centre hospitalier Émile-Roux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Enfants malades", lat: 48.84636, lng: 2.31588, ouverture: 1724, fermeture: 1927, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FNCK%2FFRAPHP075_NCK_3FI4_0339.jpg",  legende_image:"Entrée historique de l'hôpital des Enfants malades, 149, rue de Sèvres, en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/57_Enfants-Malades.pdf", histoire: "Au début du <b>XVIIIe siècle (vers 1724)</b>, la Maison de l'Enfant Jésus est fondée rue de Sèvres, à l'initiative du curé de Saint-Sulpice et grâce aux libéralités de plusieurs bienfaitrices, dont la reine Marie Leszczynska. Elle constitue l'origine directe de l'hôpital des Enfants Malades.\n\nL'hôpital des Enfants Malades s'établit à l'emplacement de cette maison, rue de Sèvres, à proximité immédiate de l'hôpital Necker.\n\nEn <b>1927</b>, l'administration générale de l'Assistance publique, contrainte d'appliquer un programme d'économies rigoureuses, tire parti de la proximité des deux structures pour les placer sous une même direction. La fusion s'opère et l'établissement prend le nom de groupe hospitalier Necker-Enfants Malades." , groupe: "groupe hospitalier Necker-Enfants malades", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares de l'enfant, hématologie pédiatrique", decouverte_1: "Premier sérum antidiphtérique appliqué à 300 enfants | 1893-1894 | Auguste Chaillou & Louis Martin (sous la direction d'Émile Roux, Institut Pasteur)", decouverte_2: "Première greffe de rein en France | 1952 | Pr Jean Hamburger, Gabriel Richet & Louis Michon" },
{ nom: "Enfants-Trouvés du faubourg Saint-Antoine ", lat: 48.85003, lng: 2.37681, ouverture: 1674, fermeture: 1838, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/59_Enfants-Trouv%C3%A9s-du-faubourg-Saint-Antoine.pdf", histoire: "Dépend de l'Hôpital Général. Consultation des services spéciaux : service des maladies du larynx, nez, oreilles (Dr Lermoyez). Situé rue du Faubourg-Saint-Antoine, entre les numéros 106 et 118, à l'emplacement de l'actuel square Trousseau.\n\nEn <b>1795</b>, réuni à l'Ancien Oratoire de la rue d'Enfer.\n\nEn <b>1801</b>, la maison du faubourg est affectée aux orphelins : hospice des Orphelins de Paris, puis annexe de l'Hôtel-Dieu.\n\nEn <b>1880</b>, devient hôpital Trousseau, puis est désaffecté et démoli. Le square Trousseau occupe désormais son emplacement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Européen Georges-Pompidou", lat: 48.83890, lng:  2.27777, ouverture: 2001, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F29FI%2FFRAPHP075_29FI_377.jpg",  legende_image:"Vues extérieures des bâtiments en 2000.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/69_Georges-Pompidou.pdf", histoire: "Dans un premier temps nommé hôpital du 15e.\n\nEn <b>1992</b>, sur proposition du maire de Paris Jacques Chirac, il reçoit la dénomination d'hôpital européen Georges-Pompidou.\n\nEn <b>2001</b>, ouverture de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Fernand Widal", lat: 48.88172, lng: 2.35848, ouverture: 1802, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F27FI%2FFRAPHP075_27FI_244.jpg",  legende_image:"Façade du bâtiment Murger et entrée principale en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/61_Fernand-Widal.pdf", histoire: "Installé dans les bâtiments de la Maison du Saint-Nom-de-Jésus, faubourg Saint-Martin.\n\nEn <b>1816</b>, transféré rue du Faubourg-Saint-Denis dans l'ancienne communauté des sœurs grises, près de la prison Saint-Lazare. Reçoit le titre de Maison royale de Santé, surnommée Maison de Santé Dubois.\n\nEn <b>1858</b>, intégralement reconstruit au 200 de la rue du Faubourg-Saint-Denis.\n\nEn <b>1959</b>, renommé hôpital Fernand-Widal." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Fortin ", lat: 49.07999, lng: 1.62669, ouverture: 1890, fermeture: null, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_234.jpg",  legende_image:"Vue de la fondation Fortin vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/65_Fortin.pdf", histoire: "En <b>1852</b>, l'exécution du legs de Théodore-Marie Fortin d'Ivry est confiée à l'Assistance publique par arrêté du Conseil d'État du 26 juillet.\n\nEn <b>1890</b>, la fondation Fortin ouvre en décembre sur un terrain dépendant de l'hôpital de La Roche-Guyon, accueillant 28 enfants parisiens âgés de 6 à 13 ans.\n\nEn <b>1922</b>, après le départ des religieuses enseignantes, les salles de classe sont remplacées par des chambres d'isolement pour enfants convalescents cardiaques.\n\nEn <b>1971-1973</b>, le pavillon Fortin est transformé pour l'accueil d'enfants handicapés." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Georges-Clémenceau (Sanatorium)", lat: 48.52092, lng: 2.43166, ouverture: 1918, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F28FI%2FFRAPHP075_28FI_054.jpg",  legende_image:"Entrée de l'hôpital en 1987", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/68_Georges-Clemenceau.pdf", histoire: "En <b>1918</b>, création du sanatorium Georges-Clémenceau, d'abord sous forme de baraquements à Bicêtre.\n\nEn <b>1935</b>, ouverture d'un nouvel établissement à Champcueil, dédié au traitement de la tuberculose.\n\nEn <b>1963</b>, changement d'activité : l'établissement se consacre désormais à la gérontologie." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Hendaye (Sanatorium d’)", lat: 43.37596, lng: -1.75985, ouverture: 1899, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F5%2FFRAPHP075_C660_5_144.jpg",  legende_image:"Vues extérieures. - L'entrée de l'hôpital vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/73_Hendaye.pdf", histoire: "En <b>1899</b>, ouverture sous la dénomination « Asile pour enfants de la ville de Paris ».\n\nEn <b>1950</b>, renommé établissement hélio-marin de la ville de Paris.\n\nEn <b>1998</b>, renommé « hôpital marin »." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Henri-Mondor", lat: 48.79804, lng: 2.45182, ouverture: 1969, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F31FI%2FFRAPHP075_31FI_194.jpg",  legende_image:"Entrée de l'hôpital en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/74_Henri-Mondor.pdf", histoire: "En <b>1970</b>, fusionne avec l'hôpital Albert-Chenevier pour former le groupe hospitalier Henri-Mondor – Albert-Chenevier." , groupe: "groupe hospitalier Henri-Mondor - Albert-Chenevier", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Hôpital de la Pitié", lat: 48.84353, lng: 2.35467, ouverture: 1809, fermeture: 1912, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_031.jpg",  legende_image:"Bâtiments de l'ancienne Pitié vers 1910.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/107_Pitié.pdf", histoire: "Le <b>1er janvier 1809</b>, une délibération du conseil général des hospices attribue à l'établissement de la rue Lacepède, dans le 5e arrondissement, le nom d'hôpital de la Pitié. Désormais indépendant de l'Hôtel-Dieu, il reçoit des adultes en médecine et chirurgie.\n\nEn <b>1820</b>, l'hôpital gère 433 lits. Ce chiffre monte à 616 en 1840, témoignant d'une activité en forte croissance.\n\nEn <b>1904</b>, face au délabrement croissant des bâtiments, l'Assistance publique décide de reconstruire l'établissement sur des terrains vacants de la Salpêtrière.\n\nEn <b>novembre 1911</b>, la démolition de l'ancienne Pitié est autorisée. Elle devient effective en 1912." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Hôtel-Dieu", lat: 48.85397, lng:  2.34821, ouverture: 1877, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0024.jpg",  legende_image:"Façade et cour intérieure Fin XIXe siècle. ", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "En <b>1867-1878</b>, reconstruction sous la conduite de l'architecte Diet, sur le côté nord du parvis Notre-Dame.\n\nEn <b>1877</b>, mis en service le 30 juillet, inauguré par Mac-Mahon le 11 août." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Hôtel-Dieu (ancien)", lat: 48.85323, lng: 2.34771, ouverture: 829, fermeture: 1878, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0007.jpg",  legende_image:"Fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "En <b>829</b> (IXe siècle), fondation de l'Hôtel-Dieu. Jusqu'au début du XVIe siècle, placé sous l'égide du clergé, en partie des chanoines de Notre-Dame.\n\nSous la Révolution, renommé Grand Hospice d'Humanité.\n\nEn <b>1878</b>, démolition de l'ancien Hôtel-Dieu, après la mise en service du nouvel établissement en 1877." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Hôtel-Dieu annexe", lat: 48.84861, lng: 2.37576, ouverture: 1839, fermeture: 1848, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "En <b>1839</b>, l'Hôtel-Dieu annexe entre en service le 2 février.\n\nEn <b>1847</b>, une partie est consacrée aux vieillards sous le nom d'asile Saint-Ferdinand.\n\nEn <b>1848</b>, l'établissement prend le nom de Sainte-Marguerite." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Incurables", lat: 48.80516, lng: 2.39587, ouverture: 1637, fermeture: 1869, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_007.jpg",  legende_image:"Plan de l'hospice en 1807.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "En <b>1634-1639</b>, l'hôpital des Incurables est édifié à Paris grâce aux dons du cardinal François de La Rochefoucauld, de l'abbé François Joulet de Châtillon et de Marguerite Rouillé.\n\nEn <b>1637</b>, les lettres patentes de Louis XIII officialisent l'établissement, qui accueille ses premiers malades la même année.\n\nEn <b>1801</b>, les hommes sont transférés dans l'ancien couvent des Récollets, rue du Faubourg-Saint-Martin, puis appelé Incurables-Hommes.\n\nEn <b>1869</b>, les malades sont réunis dans un nouvel hospice des Incurables construit à Ivry-sur-Seine par Théodore Labrouste.\n\nEn <b>1887</b>, par arrêté du 29 octobre, prend la dénomination d'hospice d'Ivry." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Jean-Verdier", lat: 48.90957, lng: 2.48790, ouverture: 1920, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F36FI%2FFRAPHP075_36FI_033.jpg",  legende_image:"L'hôpital dans les années 1970.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/80_Jean-Verdier.pdf", histoire: "En <b>1970</b>, ouverture de l'hôpital de Bondy, en Seine-Saint-Denis.\n\nEn <b>1975</b>, renommé hôpital Jean-Verdier en octobre." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Joffre", lat: 48.66597, lng: 2.42872, ouverture: 1932, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_018.jpg",  legende_image:"Sanatorium Joffre (Champrosay). Vue aérienne. Vers 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Joffre.pdf", histoire: "En <b>1932</b>, d'abord appelé sanatorium de Champrosay, reçoit en mars la dénomination de sanatorium Joffre, en mémoire du maréchal de France Joseph Joffre (1852-1931).\n\nEn <b>1967</b>, fusion des hôpitaux Joffre et Dupuytren sous une direction unique : création du groupe hospitalier Joffre-Dupuytren." , groupe: "groupe hospitalier Joffre-Dupuytren", specialites: "", decouverte_1: "", decouverte_2: "" },

{ nom: "Maison de Bicêtre", lat: 48.80988, lng: 2.35321, ouverture: 1656, fermeture: 1823, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_014.jpg",  legende_image:"L'hospital de Bicestre (XVIIe siècle).", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bic%C3%AAtre.pdf", histoire: "En <b>1656</b>, rattachée à l'Hôpital Général, la Maison de Bicêtre devient un lieu d'enfermement pour les indigents, assumant à la fois la fonction d'un hôpital, d'un asile, d'une maison de correction et d'une maison de détention." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Maison hospitalière du faubourg Saint-Antoine", lat: 48.84861, lng: 2.37576, ouverture: 1680, fermeture: 1795, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "Dans la seconde moitié du <b>XVIIe siècle</b>, fondation de la maison hospitalière du faubourg Saint-Antoine. Elle abrite des enfants abandonnés sous le nom d'hospice des Enfants-Trouvés du faubourg Saint-Antoine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Maternité de Port-Royal", lat: 48.83888, lng: 2.33750, ouverture: 1795, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FSerie_Fosseyeux%2F834FOSS%2F834FOSS_070%2FFRAPHP075_834FOSS70_1.jpg",  legende_image:"Hospice de la maternité [1811].", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/95_Maternité_de_Port-Royal.pdf", histoire: "En <b>1793-1794</b>, l'ancienne abbaye de Port-Royal est transformée en lieu de détention sous le nom de prison de Port-Libre ou prison de la Bourbe.\n\nEn <b>1795</b>, la Convention restitue l'établissement à l'administration générale des hospices, affecté aux enfants trouvés. Devient Maison de l'Allaitement.\n\nEn <b>1814</b>, transfert des services d'accouchement de l'Oratoire et de l'École d'accouchement ; prend le nom de Maternité.\n\nEn <b>1890</b>, ouverture de la clinique Baudelocque sur une partie du domaine. Rattachée à Cochin." , groupe: "groupe hospitalier Cochin-Port-Royal", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Michel-Brézin (fondation)", lat: 48.83865, lng: 2.16881, ouverture: 1833, fermeture: 1946, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_124.jpg",  legende_image:"Cour et arcades de l'ancien hospice de la Reconnaissance vers 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/110_Reconnaissance.pdf", histoire: "En <b>1828</b>, Michel Brézin formule par testament du 16 décembre un legs au Conseil général des hospices afin d'y établir un hospice de retraite à Garches.\n\nEn <b>1946</b>, la fondation Michel-Brézin est annexée à l'hôpital Raymond-Poincaré et devient le pavillon Brézin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Necker", lat: 48.84636, lng: 2.31588, ouverture: 1778, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FNCK%2FFRAPHP075_NCK_3FI4_0315.jpg",  legende_image:"Entrée des urgences enfants, ORL, maternité en 1999.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/99_Necker.pdf", histoire: "En <b>1778</b>, l'hôpital Necker est fondé rue de Sèvres, à l'emplacement de l'ancien couvent des Bénédictines Notre-Dame de Liesse. Il est d'abord nommé hospice de Charité, puis hospice des paroisses de Saint-Sulpice et du Gros-Caillou, et se consacre à la médecine et chirurgie de l'adulte.\n\nEn <b>1792</b>, l'établissement devient l'hospice de l'Ouest.\n\nEn <b>1802</b>, l'administration décide de lui attribuer le nom de sa fondatrice, qui l'a dirigé jusqu'en 1788 : il prend le nom d'hôpital Necker.\n\nEn <b>1927</b>, l'hôpital Necker fusionne avec l'hôpital des Enfants malades pour former l'hôpital Necker-Enfants Malades.\n\nParmi les services spécialisés, on compte notamment le service des Maladies des voies urinaires, animé par le Pr Guyon et le Dr Routier." , groupe: "groupe hospitalier Necker-Enfants malades", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares, néphrologie, maladies génétiques", decouverte_1: "Invention du stéthoscope | 1816 | Dr René Laennec", decouverte_2: "Première greffe de rein en France | 1952 | Pr Jean Hamburger & Louis Michon" },
{ nom: "Notre-Dame-de-Pitié", lat: 48.84353, lng: 2.35467, ouverture: 1612, fermeture: 1809, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1612</b>, fondée sous la régence de Marie de Médicis, la maison dite Pitié ou Notre-Dame-de-Pitié s'établit faubourg Saint-Victor pour accueillir mendiants et vieillards, en application de l'édit royal du 27 avril 1612.\n\nEn <b>1657</b>, rattaché à l'Hôpital Général, prend par délibération du 7 mai le nom de Notre-Dame-de-Pitié.\n\nEn <b>1792</b>, devient orphelinat Saint-Victor, puis maison de la Patrie sous la Révolution.\n\nEn <b>1803</b>, prend le nom d'hospice des Orphelins.\n\nEn <b>1808</b>, les enfants sont transférés et l'établissement devient annexe de l'Hôtel-Dieu." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Parent-de-Rosan (Orphelinat)", lat: 48.84286, lng: 2.26674, ouverture: 1895, fermeture: 1962, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/100_Parent-de-Rosan.pdf", histoire: "En <b>1890</b>, décès de Charles-Félix Parent le 8 février, dont le testament prévoyait la création d'un orphelinat.\n\nEn <b>1895</b>, l'orphelinat ouvre ses portes dans la propriété du bienfaiteur dans le 16e arrondissement de Paris, sous le nom de fondation Parent-de-Rosan.\n\nEn <b>1962</b>, à compter du 1er janvier, l'établissement cesse de relever de l'Assistance publique et est rattaché au bureau d'aide sociale à l'enfance." , groupe: "groupe hospitalier Sainte Périne-Chardon-Lagache-Rossini-Parent-de-Rosan", specialites: "", decouverte_1: "", decouverte_2: "" },
{ nom: "Paul-Brousse", lat: 48.79507, lng: 2.36372, ouverture: 1913, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FPBR%2FFRAPHP075_PBR_3FI4_0278.jpg",  legende_image:"Entrée principale en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/101_Paul-Brousse.pdf", histoire: "En <b>1913</b>, l'hospice départemental de Villejuif, également appelé hospice départemental Paul-Brousse, entre en service." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "" },

legend.onAdd = function () {

        Établissement en activité
      </div>
      <div id="leg-ferme" data-filtre="ferme" style="cursor:pointer;padding:3px 5px;border-radius:4px;margin-top:3px;transition:background 0.2s;">
        <span style="display:inline-block;width:12px;height:12px;background:red;border-radius:50%;margin-right:6px;"></span>
        Ancien établissement AP-HP
      </div>
      <div id="leg-detruit" data-filtre="detruit" style="cursor:pointer;padding:3px 5px;border-radius:4px;margin-top:3px;transition:background 0.2s;">
        <span style="display:inline-block;width:12px;height:12px;background:black;border-radius:50%;margin-right:6px;"></span>
        Établissement détruit/rasé
      </div>
    </div>
  `;

  // Gestion des clics APRÈS insertion dans le DOM
  setTimeout(() => {
    ["leg-actif","leg-ferme","leg-detruit"].forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("mouseenter", () => {
        if (!el.classList.contains("leg-actif-on")) el.style.background = "#f0f0f0";
      });
      el.addEventListener("mouseleave", () => {
        if (!el.classList.contains("leg-actif-on")) el.style.background = "";
      });
      el.addEventListener("click", () => {
        const filtre = el.dataset.filtre;
        // Toggle : si déjà actif on réinitialise, sinon on active
        if (filtreStatut === filtre) {
          filtreStatut = null;
          el.style.background = "";
          el.style.outline = "";
        } else {
          filtreStatut = filtre;
          // Réinitialiser les autres
          ["leg-actif","leg-ferme","leg-detruit"].forEach(otherId => {
            const other = document.getElementById(otherId);
            if (other) { other.style.background = ""; other.style.outline = ""; }
          });
          el.style.background = "#e0eaff";

        }
updateMap(
  parseInt(document.getElementById("yearStart").value),

);
      });
    });
  }, 300);

  return div;
};

function createMarker(e, couleur) {

 marker.bindPopup(`<strong>${e.nom}</strong>`, {

/* =========================
   Filtre statut (légende cliquable)
   ========================= */
let filtreStatut = null; // null = tout afficher | "actif" | "ferme" | "detruit"

/* =========================
   Fonction de filtrage
   ========================= */

function updateMap(yearBegin, year) {
  if (yearBegin === undefined) yearBegin = 829;
  markersLayer.clearLayers();

  // Récupère la valeur du filtre type sélectionné
  const typeSelectionne = document.getElementById("typeFilter")
    ? document.getElementById("typeFilter").value
    : "";

  for (let i = 0; i < etablissements.length; i++) {
    const e = etablissements[i];
    const type = (e.type || "").toLowerCase().trim();
    const ouverture = Number(e.ouverture);
    const fermeture = e.fermeture !== null && e.fermeture !== ""
      ? Number(e.fermeture)
      : Infinity;

    // Filtre par statut (légende cliquable)
    if (filtreStatut !== null) {
      const estDetruit = (e.detruit || "").toLowerCase() === "oui";
      const ouvertureNum = Number(e.ouverture);
      const fermetureNum = e.fermeture !== null && e.fermeture !== "" ? Number(e.fermeture) : Infinity;
      const estFerme = year >= fermetureNum;
      const estActif = !estFerme && !estDetruit;
      if (filtreStatut === "actif"   && !estActif)   continue;
      if (filtreStatut === "ferme"   && (!estFerme || estDetruit)) continue;
      if (filtreStatut === "detruit" && !estDetruit) continue;
    }

    // Filtre par type (comparaison normalisée : sans accent, minuscules)
    if (typeSelectionne !== "") {
      const typeNorm = type
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase().trim();
      const typesConnus = ["hopital", "fondation", "ecole", "musee", "orphelinat", "retraite", "sanatorium"];
      if (typeSelectionne === "autre") {
        if (typesConnus.includes(typeNorm)) continue;
      } else {
        if (typeNorm !== typeSelectionne) continue;
      }
    }

    // Déterminer si l'établissement doit être visible
const ouvert = ouverture <= year && (e.fermeture === null || e.fermeture === "" || Number(e.fermeture) >= yearBegin);
    const ferme = year >= fermeture;

    if (ouvert) {
      let couleur = "blue"; // par défaut : actif

      if (ferme) {
        couleur = "red";
      }

      if (e.type === "musée") {
        couleur = COULEUR_MUSEE;
      }

      const marker = createMarker(e, couleur);
      marker.addTo(markersLayer);
      markersIndex[normalize(e.nom)] = marker;
      markersIndex[e.nom.trim().toLowerCase()] = marker;
    }
  }

    // Mise à jour de la notice des ouvertures
  document.getElementById("notice-year").textContent = year;

  const ouvertures = etablissements.filter(e => e.ouverture === year);
  const noticeContent = document.getElementById("notice-content");

  if (ouvertures.length === 0) {
    noticeContent.textContent = "Aucune ouverture";
  } else {
    noticeContent.innerHTML = ouvertures
      .map(e => `• <strong>${e.nom}</strong>`)
      .join("<br>");
  }
}


/* =========================
   Timeline
   ========================= */

const slider = document.getElementById("yearSlider");
const label = document.getElementById("yearLabel");
const sliderStart = document.getElementById("yearStart");
const labelStart = document.getElementById("labelStart");

// Écouteur filtre type
document.getElementById("typeFilter").addEventListener("change", () => {
  updateMap(parseInt(sliderStart.value), parseInt(slider.value));
});

// Curseur de fin → met à jour le champ texte
slider.addEventListener("input", () => {
  let yearEnd = parseInt(slider.value);
  let yearBegin = parseInt(sliderStart.value);
  if (yearEnd < yearBegin) { yearEnd = yearBegin; slider.value = yearEnd; }
  label.value = yearEnd;
  updateMap(yearBegin, yearEnd);
});

// Champ texte de fin → met à jour le curseur
label.addEventListener("change", () => {
  let yearEnd = Math.min(2026, Math.max(829, parseInt(label.value) || 2026));
  let yearBegin = parseInt(sliderStart.value);
  if (yearEnd < yearBegin) { yearEnd = yearBegin; }
  label.value = yearEnd;
  slider.value = yearEnd;
  updateMap(yearBegin, yearEnd);
});

// Curseur de début → met à jour le champ texte
sliderStart.addEventListener("input", () => {
  let yearBegin = parseInt(sliderStart.value);
  let yearEnd = parseInt(slider.value);
  if (yearBegin > yearEnd) { yearBegin = yearEnd; sliderStart.value = yearBegin; }
  labelStart.value = yearBegin;
  updateMap(yearBegin, yearEnd);
});

// Champ texte de début → met à jour le curseur
labelStart.addEventListener("change", () => {
  let yearBegin = Math.min(2026, Math.max(829, parseInt(labelStart.value) || 829));
  let yearEnd = parseInt(slider.value);
  if (yearBegin > yearEnd) { yearBegin = yearEnd; }
  labelStart.value = yearBegin;
  sliderStart.value = yearBegin;
  updateMap(yearBegin, yearEnd);
});

/* Initialisation */
updateMap(parseInt(sliderStart.value), parseInt(slider.value));
const searchInput = document.getElementById("searchInput");
const searchResults = document.getElementById("searchResults");

searchInput.addEventListener("input", () => {
  const query = searchInput.value.trim().toLowerCase();
  searchResults.innerHTML = "";

  if (query.length < 2) {
    searchResults.style.display = "none";
    return;
  }

  const matches = etablissements.filter(e =>
    e.nom.toLowerCase().includes(query)
  );

  if (matches.length === 0) {
    searchResults.style.display = "none";
    return;
  }

  matches.forEach(e => {
    const item = document.createElement("div");
    item.textContent = e.nom;
    item.style.padding = "6px";
    item.style.cursor = "pointer";

    item.addEventListener("click", () => {
      const marker = markersIndex[e.nom.trim().toLowerCase()];
      if (!marker) return;

      map.setView(marker.getLatLng(), 15);
      marker.openPopup();

      searchResults.style.display = "none";
      searchInput.value = e.nom;
    });

    item.addEventListener("mouseenter", () => item.style.background = "#eee");
    item.addEventListener("mouseleave", () => item.style.background = "white");

    searchResults.appendChild(item);
  });

  const rect = searchInput.getBoundingClientRect();
  searchResults.style.left = rect.left + "px";
  searchResults.style.top = rect.bottom + "px";
  searchResults.style.width = rect.width + "px";
  searchResults.style.display = "block";
});
function selectEtablissement(e) {
  const marker = markersIndex[normalize(e.nom)];
  if (!marker) return;

  map.setView(marker.getLatLng(), 14, { animate: true });
  marker.openPopup();

  resultsBox.style.display = "none";
}

  const overlay = document.getElementById("imageOverlay");
  const img = document.getElementById("overlayImage");

  img.src = src;
  img.alt = alt;

  overlay.style.display = "flex";
}

function closeImageOverlay() {
  document.getElementById("imageOverlay").style.display = "none";
}
