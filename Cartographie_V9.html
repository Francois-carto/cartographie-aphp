{ nom: "Adélaïde-Hautval", lat: 49.00382, lng: 2.40207, ouverture: 1964, fermeture: 2021, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FCRC%2FFRAPHP075_CRC_3FI4_0182.jpg",  legende_image:"Entrée de l'hôpital en 1989.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/39_Charles-Richet.pdf", histoire: "Dans les années <b>1960</b>, l'Assistance publique décide de créer à Villiers-le-Bel un établissement de moyen séjour pour malades chroniques. Le chantier ouvre le 1er avril 1964, sous la direction des architectes Larrousse et Bertheloot.\n\nEn <b>1965</b>, l'hôpital de Villiers-le-Bel reçoit le 7 octobre le nom d'hôpital Charles-Richet.\n\nEn <b>2015</b>, le 13 mai 2015, l'hôpital est officiellement rebaptisé par l'AP-HP Hôpital Adélaïde-Hautval, du nom d'une médecin psychiatre française rescapée des camps de concentration nazis et reconnue Juste parmi les nations.\n\nEn <b>2021</b>, L'hôpital à quitté le giron de l'AP-HP." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Allart-de-Fourment", lat: 50.26956, lng: 2.30154, ouverture: 1936, fermeture: 1962, type: "", detruit:"",  images:"",  legende_image:" ", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Allart-de-Fourment.pdf", histoire: "En <b>1935</b>, Madame Allart de Fourment lègue le château de Cercamps, situé à Frévent dans le Pas-de-Calais, à l'administration publique.\n\nEn <b>1936</b>, une maison de convalescence ouvre le 23 avril pour accueillir des fillettes de 5 à 12 ans.\n\nEn <b>1939</b>, réquisitionné en septembre par l'armée britannique, l'établissement ferme ses portes.\n\nEn <b>1945</b>, la fondation cesse toute activité, la tentative de réouverture de 1942 n'ayant pas abouti.\n\nEn <b>1961</b>, le décret n° 61-1305 du 5 décembre transfère l'établissement à la préfecture de Paris, qui le reconvertit en centre de formation professionnelle pour les filles sous tutelle de l'Assistance publique.\n\nEn <b>1968</b>, le transfert est définitivement acté le 1er janvier, en application du décret n° 67-923 du ministère des Affaires sociales." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Andral (Tournelles)", lat: 48.89488, lng: 2.39026, ouverture: 1906, fermeture: 1933, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_067.jpg",  legende_image:"L'hôpital vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Andral-Tournelles.pdf", histoire: "En <b>1906</b>, l'administration lui attribue le caractère d'hôpital général et change sa dénomination : il devient l'hôpital Andral, en mémoire de Gabriel Andral (1797-1876), médecin et professeur de pathologie et de thérapeutique à la Faculté de médecine de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Antoine-Béclère", lat: 48.78869, lng: 2.25464, ouverture: 1971, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F14FI%2FFRAPHP075_14FI_092.jpg",  legende_image:"Entrée principale par la rue de la porte de Trivaux, 1973.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Antoine-Beclere.pdf", histoire: "En <b>1963</b>, l'étude de l'hôpital de Clamart est lancée.\n\nEn <b>1970</b>, bien avant sa mise en service, l'établissement reçoit la dénomination d'hôpital Antoine-Béclère, du nom du fondateur de la radiologie française (26-1939). Conçu par l'architecte Henri Pottier, il est édifié de 1967 à 1971." , groupe: "AP-HP. Université Paris-Saclay", specialites: "Procréation médicalement assistée (PMA), maternité type III, pneumologie, cardiologie", decouverte_1: "Premier bébé éprouvette de France (Amandine) | 1982 | Pr Jacques Testart & Dr René Frydman", decouverte_2: "", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&type=population&RECH_Collectivite_Libel=Antoine-B%C3%A9cl%C3%A8re+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=91b253b0f53b75d98ba6305895315f0e%7C", url_musee: "" },
{ nom: "Antoine-Chantin", lat: 48.82736, lng: 2.32238, ouverture: 1940, fermeture: 1970, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Antoine-Chantin.pdf", histoire: "En <b>1940</b>, la clinique Antoine-Chantin, située dans le 14e arrondissement de Paris, devient à partir de novembre un hôpital temporaire ouvert aux malades de l'Assistance publique. Elle abrite un service de chirurgie et constitue, avec les hôpitaux Manin et Piccini, l'une des institutions privées parisiennes mobilisées pour pallier le manque de lits durant la Seconde Guerre mondiale.\n\nEn <b>1954</b>, l'Assistance publique est autorisée à occuper à nouveau la clinique à partir du 1er janvier, le service de chirurgie ayant continué de fonctionner après 1945. Rattaché administrativement à l'hôpital Broussais, l'hôpital Antoine-Chantin compte 121 lits d'hospitalisation en chirurgie et 10 lits de crèche en 1958.\n\nÀ la fin des années <b>1970</b>, les bâtiments sont démolis et les services réintégrés à l'hôpital Broussais, qui devient le groupe hospitalier Broussais – Antoine-Chantin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Approvisionnement central", lat: 48.76249, lng: 2.35808, ouverture: 23, fermeture: null, type: "", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>23</b>, création de l'Approvisionnement central, installé pavillon des Halles.\n\nEn <b>1969</b>, transfert à Rungis.\n\nEn <b>1989</b>, fusion avec le Magasin central ; devient l'Approvisionnement Central Hôtelier Alimentaire (ACHA)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Armand-Trousseau", lat: 48.84222, lng: 2.40556, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F54FI%2FFRAPHP075_54FI_091.jpg",  legende_image:"Entrée de l'hôpital en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "En <b>1901</b>, le nouvel hôpital Trousseau entre en service le 15 mars, reconstruit par les architectes Maistrasse et Berger au 26 avenue du Dr Arnold Netter dans le 12e arrondissement de Paris." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Asile Saint-Ferdinand", lat: 48.84891, lng: 2.37576, ouverture: 1847, fermeture: 1848, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1847</b>, l'administration consacre une partie des locaux de l'Hôtel-Dieu annexe à l'accueil de vieillards, baptisés asile Saint-Ferdinand, en hommage au duc d'Orléans, fils du roi Louis-Philippe.\n\nEn <b>1848</b>, supprimé le 12 octobre, les pensionnaires sont transférés vers l'hospice de La Rochefoucauld. L'établissement prend alors le nom d'hôpital Sainte-Marguerite." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Aubervilliers (hôpital temporaire d’)", lat: 48.89880, lng: 2.332, ouverture: 1884, fermeture: 1904, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_008.jpg",  legende_image:"L'hôpital temporaire vers 1884-1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/43_Claude-Bernard.pdf", histoire: "En <b>1884</b>, l'hôpital temporaire d'Aubervilliers ouvre le 20 novembre le long des fortifications au nord de Paris pour accueillir les convalescents des hôpitaux parisiens.\n\nEn <b>1901</b>, un projet de reconstruction est adopté.\n\nEn <b>1904</b>, les anciens baraquements sont incendiés le 12 juillet.\n\nEn <b>1905</b>, le nouvel établissement reconstruit sur les plans de François Renaud prend le nom d'hôpital Claude-Bernard et est inauguré le 30 novembre." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Avicenne", lat: 48.9095, lng:  2.5009, ouverture: 1979, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F15FI%2FFRAPHP075_15FI_004.jpg",  legende_image:"Entrée de l'hôpital en 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Avicenne.pdf", histoire: "En <b>1931</b>, débute la construction de l'hôpital franco-musulman à Bobigny par les architectes Mantout et Azéma, relevant de la préfecture de la Seine.\n\nEn <b>1935</b>, inauguré en mars, l'établissement entre en fonctionnement le 2 mai.\n\nEn <b>1979</b>, l'administration lui attribue le nom d'hôpital Avicenne, en mémoire d'Abou Ali Al Husayn Ibn Sina dit Avicenne (980-1037), originaire du Turkestan." , groupe: "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Bastion 29", lat: 48.89752, lng: 2.38799, ouverture: 1893, fermeture: 1934, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_047.jpg",  legende_image:"vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bastion29.pdf", histoire: "En <b>1893</b>, le 21 décembre, une partie de la caserne d'octroi du bastion 29, boulevard Macdonald, est appropriée pour l'installation d'un service de malades. Mis à disposition par l'autorité militaire, le poste caserne devient l'hôpital du bastion 29." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Bastion 36", lat: 48.90090, lng: 2.34624, ouverture: 1891, fermeture: 1894, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bastion36.pdf", histoire: "En <b>1889-1890</b>, une pandémie de grippe dite grippe russe nécessite de désengorger les hôpitaux parisiens : le ministère de la Guerre met provisoirement à disposition de l'Assistance publique une caserne d'octroi près de la porte de Clignancourt.\n\nEn <b>1894</b>, l'administration restitue l'hôpital temporaire le 31 mars, le Génie ayant réclamé la restitution du poste-caserne à l'été 1893." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Baudelocque", lat: 48.83825, lng: 2.33706, ouverture: 1889, fermeture: 2007, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Baudelocque.pdf", histoire: "En <b>1889</b>, ouverture de la clinique Baudelocque, installée sur un terrain de la Maternité Port-Royal.\n\nEn <b>1922-1929</b>, reconstruction en Maternité Baudelocque.\n\nDans les années <b>1960</b>, rattachée au groupe hospitalier Cochin.\n\nEn <b>2007</b>, les bâtiments de la clinique Baudelocque sont démolis." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Beaujon Clichy", lat: 48.90836, lng: 2.30821, ouverture: 1935, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBJN%2FFRAPHP075_BJN_3FI4_0077.jpg",  legende_image:"Entrée et loge du concierge en 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/18_Beaujon-Clichy.pdf", histoire: "En <b>1930</b>, un concours est ouvert le 9 août pour remplacer l'hôpital Beaujon à Paris, devenu vétuste.\n\nEn <b>1932</b>, les travaux débutent à Clichy sous la direction de MM. Plousey, Cassan et Jean Walter. Premier hôpital vertical non pavillonnaire monobloc de France, avec ses douze étages." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Beaujon Paris", lat: 48.87533, lng: 2.30609, ouverture: 1784, fermeture: 1937, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBJN%2FFRAPHP075_BJN_3FI4_0410.jpg",  legende_image:"Salle d'attente en 1910.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/17_Beaujon-Paris-1784-1937.pdf", histoire: "En <b>1784</b>, Nicolas Beaujon fonde à Paris, faubourg du Roule, un établissement nommé hospice Saint-Nicolas, destiné à recevoir douze garçons et douze filles orphelins de la paroisse de Saint-Philippe-du-Roule. Bientôt appelé hospice Beaujon, l'établissement édifié sur les plans de l'architecte Girardin prend en charge gratuitement l'entretien et l'instruction des jeunes orphelins." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Belleville (hospice de)", lat: 48.87486, lng: 2.39810, ouverture: 23, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/19_Belleville.pdf", histoire: "En <b>21</b>, la commune de Belleville fonde un hospice pour vieillards, établi rue Pelleport.\n\nEn <b>23</b>, l'hospice de Belleville est inauguré le 15 août et confié dès son ouverture à la gestion du Bureau de bienfaisance de l'arrondissement.\n\nAprès l'annexion de Belleville à Paris, l'établissement, très dégradé, est rattaché à l'Assistance publique – Hôpitaux de Paris, qui en assure la restauration." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Beloeuil ", lat: 48.88708, lng: 2.27318, ouverture: 1903, fermeture: 1972, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/20_Beloeuil.pdf", histoire: "En <b>1903</b>, la fondation Beloeuil ouvre à Neuilly, dans l'ancienne propriété d'Aline-Augustine Beloeuil dont le legs en est à l'origine. Destinée à recevoir et entretenir gratuitement 50 jeunes filles, femmes ou veuves infirmes incurables, elle dépend administrativement de la maison de retraite Galignani. Elle accueille principalement d'anciennes servantes et employées sans ressources du 17e arrondissement de Paris et de Neuilly-sur-Seine.\n\nEn <b>1960</b>, la fondation Beloeuil-Miller gère 106 lits de long séjour.\n\nEn <b>1972</b>, par décret du 30 décembre, l'établissement est rattaché au bureau d'aide sociale de Paris, avec effet au 1er janvier 1973." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Berck-sur-mer (hôpital maritime de)", lat: 50.40180, lng: 1.55744, ouverture: 1861, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F16FI%2FFRAPHP075_16FI_041.jpg",  legende_image:"Galeries de cure d'air en 1951.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/21_Berck.pdf", histoire: "En <b>1861</b>, un premier hôpital expérimental est établi sous forme de baraquements de bois sur la plage pour soigner des enfants atteints de rachitisme et d'affections scrofuleuses.\n\nEn <b>1867</b>, un établissement plus vaste est construit sur les plans de l'architecte Émile Lavezzari.\n\nEn <b>1869</b>, inauguré le 8 juillet par l'impératrice Eugénie de Montijo, l'établissement prend le nom d'hôpital Napoléon et compte près de 500 lits.\n\nEn <b>1870</b>, renommé hôpital maritime de la Ville de Paris. Les bâtiments sont agrandis et reconstruits entre 1894 et 1910, portant la capacité à plus de 1 000 lits.\n\nEn <b>1961</b>, l'établissement prend la dénomination d'hôpital maritime de Berck, spécialisé en chirurgie orthopédique et restauration motrice." , groupe: "AP-HP. Université Paris-Saclay", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Bicêtre", lat: 48.80986, lng: 2.35746, ouverture: 1885, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBCT%2FFRAPHP075_BCT_3FI4_0130.jpg",  legende_image:"Entrée principale vue de la cour intérieure en 1964.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bicêtre.pdf", histoire: "En <b>1885</b>, l'établissement reprend son ancienne dénomination et redevient Bicêtre.\n\nEn <b>1950</b>, l'hospice est transformé en hôpital de soins pour aigus.\n\nEn <b>1952</b>, deux pavillons sont modernisés et aménagés en hôpital pour enfants." , groupe: "AP-HP. Université Paris-Saclay", specialites: "Neurologie, neurochirurgie, chirurgie vasculaire, immunopathologie, maternité type III", decouverte_1: "Localisation du centre du langage (aire de Broca) | 1861 | Pr Paul Broca", decouverte_2: "", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&type=population&RECH_Collectivite_Libel=Bic%C3%AAtre+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=5722bee7f13ebcb98d52c05af1ca37f1%7C", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%22181%22&mcpid=181" },
{ nom: "Bichat", lat: 48.89957, lng: 2.33228, ouverture: 1882, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBCH%2FFRAPHP075_BCH_3FI4_0326.jpg",  legende_image:"Entrée de l'hôpital en 1990.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/23_Bichat.pdf", histoire: "Ancien poste caserne du bastion 39.\n\nEn <b>1988</b>, rattaché au groupe hospitalier Bichat-Claude-Bernard." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Cardiologie, maladies infectieuses et tropicales, neurologie, pneumologie, urgences, greffes d'organe", decouverte_1: "Premier service de réanimation respiratoire en France (traitement de la poliomyélite) | 1954 | Pr Pierre Mollaret", decouverte_2: "", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&RECH_Collectivite_Libel=Bichat+%28h%C3%B4pital%29%7CBichat-Claude-Bernard+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=ef256e80bece71d9210f076de72e9586%7C6f98243a416661ff89612a8cf380e58c%7C&type=population", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%22182%22&mcpid=182" },
{ nom: "Bigottini ", lat: 48.93015, lng: 2.50282, ouverture: 1906, fermeture: 1970, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F17FI%2FFRAPHP075_17FI_02.jpg",  legende_image:"Entrée de l'hôpital en 1978.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bigottini.pdf", histoire: "En <b>1903</b>, l'abbé Dumont donne à l'administration une propriété à Aulnay-sous-Bois en vue de l'aménagement d'un hospice.\n\nEn <b>1906</b>, l'établissement ouvre le 1er juin sous le nom de maison de retraite Bigottini, grâce aux legs du baron Alphonse de Rothschild et de François Bigottini.\n\nEn <b>1970</b>, par arrêté ministériel du 20 août, rattaché à l'hôpital René-Muret de Sevran, prend la dénomination d'hôpital René-Muret – Bigottini.\n\nEn <b>2019</b>, intègre le groupe AP-HP Hôpitaux universitaires Paris Seine-Saint-Denis." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Blanchisserie centrale", lat: 48.89859, lng: 2.38083, ouverture: 1906, fermeture: null, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F74FI%2FFRAPHP075_74FI_029.jpg",  legende_image:"Vue d'ensemble des chaînes en 1988.", url:"", histoire: "En <b>1906</b>, ouverture de la Blanchisserie centrale.\n\nEn <b>1946</b>, devient le Service central des blanchisseries (SCB)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Boucherie centrale", lat: 48.83231, lng: 2.30283, ouverture: 1849, fermeture: 1898, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F88FI%2FFRAPHP075_88FI_001.jpg",  legende_image:"Entrée vers 1970.", url:"", histoire: "En <b>1849</b>, la boucherie centrale ouvre d'abord à Villejuif.\n\nEn <b>1898</b>, transfert dans le 15e arrondissement. Elle se compose de plusieurs unités dont une triperie créée en 1930 et une charcuterie en 1931.\n\nEn <b>1976</b>, cessation d'activité." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Boucicaut, Chalon-sur-Saône", lat: 46.77720, lng: 4.84034, ouverture: 1886, fermeture: 1946, type: "maternite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_163.jpg",  legende_image:"Les bâtiments vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/28_Boucicaut-Chalon-sur-Sa%C3%B4ne.pdf", histoire: "En <b>1886</b>, Marguerite Boucicaut née Guérin lègue le 16 décembre à l'Assistance publique les fonds pour l'édification d'une maternité à Chalon-sur-Saône, d'après les plans de l'architecte Gondrier.\n\nEn <b>1946</b>, mise à disposition de l'administration hospitalière de Chalon-sur-Saône pour 99 ans. Dépend aujourd'hui du groupe hospitalier William-Morey." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Boucicaut, hospice de Bellême", lat: 48.37345, lng: 0.56762, ouverture: 1903, fermeture: 1961, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Boucicaut-Belleme.pdf", histoire: "En <b>1887</b>, décès de Marguerite Boucicaut née Guérin en décembre, dont les dispositions testamentaires prévoient la fondation d'un hospice à Bellême (Orne).\n\nEn <b>1903</b>, ouverture de l'établissement Boucicaut de Bellême, destiné à hospitaliser des femmes âgées et à accueillir de jeunes filles dans un ouvroir externe.\n\nEn <b>1961</b>, transféré à la préfecture de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Boucicaut, Mont-Saint-Aignan", lat: 49.47330, lng: 1.08145, ouverture: 1898, fermeture: 1960, type: "maternite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_149.jpg",  legende_image:"Les bâtiments vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/29_Boucicaut-Mont-Saint-Aignan.pdf", histoire: "En <b>1889</b>, le décret présidentiel du 19 juillet autorise l'Assistance publique de Paris à accepter le legs Boucicaut pour la création d'une maternité près de Rouen.\n\nEn <b>1898</b>, ouverture de la maternité Boucicaut de Mont-Saint-Aignan, construite par l'architecte Gosselin. Dépend aujourd'hui du CHU de Rouen." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Boucicaut, Paris, quartier Javel", lat: 48.84216, lng: 2.28414, ouverture: 1897, fermeture: 2000, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/30_Boucicaut-Paris.pdf", histoire: "La fondation de l'hôpital Boucicaut concrétise les volontés testamentaires de Madame veuve Boucicaut. L'administration acquiert un terrain sur la rive gauche et confie le projet aux architectes Legros père et fils.\n\nEn <b>2000</b>, les activités sont transférées dans l'hôpital européen Georges-Pompidou." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Boucicaut, Roubaix", lat: 50.68194, lng: 3.16631, ouverture: 1897, fermeture: 1925, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_159.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/31_Boucicaut-Roubaix.pdf", histoire: "En <b>1889</b>, le décret présidentiel du 19 juillet autorise l'Assistance publique à accepter le legs Boucicaut pour la fondation d'une maternité aux environs de Lille.\n\nEn <b>1897</b>, l'établissement conçu par l'architecte Calier ouvre ses portes le 5 juillet à Roubaix, boulevard de Cambrai.\n\nEn <b>1925</b>, convention pour prise à bail." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Boulangerie centrale", lat: 48.83858, lng: 2.35335, ouverture: 1675, fermeture: 1974, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F97FI%2FFRAPHP075_97FI_092.jpg",  legende_image:"Paneterie, début XXe siècle.", url:"", histoire: "En <b>1675</b>, la boulangerie centrale, d'abord installée à la Salpêtrière, est déplacée à la maison de Scipion (5e arrondissement).\n\nEn <b>1797</b>, par arrêté du 12 thermidor an V, la fabrication du pain est centralisée pour l'ensemble de la population hospitalière.\n\nEn <b>1974</b>, fermeture de la boulangerie centrale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Bretonneau", lat: 48.89025, lng:  2.32994, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F19FI%2FFRAPHP075_19FI_297.jpg",  legende_image:"Entrée de l'hôpital, rue Carpeaux en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/32_Bretonneau.pdf", histoire: "En <b>1988</b>, fermeture de l'établissement ; les activités pédiatriques sont transférées à l'hôpital Robert-Debré.\n\nEn <b>2001</b>, rouvre à vocation gérontologique. Accueille également un centre d'odontologie." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Brévannes (hospice de)", lat: 48.74832, lng: 2.4853, ouverture: 1885, fermeture: 1950, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F26FI%2FFRAPHP075_26FI_044.jpg",  legende_image:"Pavillon des services généraux en 1933.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/55_Emile-Roux.pdf", histoire: "En <b>1883</b>, le 19 septembre, l'Assistance publique achète au baron Hottinger une propriété à Limeil-Brévannes composée d'un château, de dépendances et d'un parc.\n\nEn <b>1885</b>, les premiers patients sont accueillis le 29 juillet, principalement des vieillards veufs, célibataires et en couple.\n\nEn <b>1896-1899</b>, création d'un quartier pour malades chroniques, suivi d'un sanatorium pour adultes tuberculeux (1907) et d'un hospice pour enfants convalescents (1908).\n\nEn <b>1950</b>, par décret du 18 octobre, l'ensemble des pavillons de Brévannes est renommé centre hospitalier Émile-Roux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Broca", lat: 48.83436, lng: 2.34740, ouverture: 1893, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FBRC%2FFRAPHP075_BRC_3FI4_0040.jpg",  legende_image:"Entrée en 1969.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/33_Broca.pdf", histoire: "En <b>1834</b>, acquis par le conseil général des hospices.\n\nEn <b>1893</b>, prend le nom d'hôpital Broca. Consultation des services spéciaux : service de gynécologie (Dr Pozzi) ; service des maladies cutanées et syphilitiques." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Broussais", lat: 48.82800, lng:  2.31169, ouverture: 1883, fermeture: 2000, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/34_Broussais.pdf", histoire: "Ouvre provisoirement sous le nom d'hôpital des Mariniers, fonctionnant de façon intermittente pour des malades chroniques.\n\nEn <b>1885</b>, conservé définitivement en février, il reçoit le nom du médecin fondateur de l'école de physiologie : Broussais." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Cave centrale", lat: 48.84969, lng: 2.34831, ouverture: 1816, fermeture: 1962, type: "", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1816</b>, création de la cave centrale, d'abord située dans l'hospice des Enfants-Trouvés du parvis Notre-Dame.\n\nEn <b>1849</b>, transfert à l'entrepôt Saint-Bernard, situé à la halle aux vins dans le 5e arrondissement.\n\nEn <b>1962</b>, fermeture progressive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Cent-Filles (Notre-Dame de la Miséricorde)", lat: 48.84029, lng: 2.35259, ouverture: 1622, fermeture: 1795, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/35_Cent-Filles.pdf", histoire: "En <b>1622</b>, Antoine Séguier achète une bâtisse rue Censier pour y établir un hospice.\n\nEn <b>1623</b>, par lettres patentes de janvier, est édifié l'hôpital des Cent-filles orphelines, également connu sous la dénomination de Notre-Dame de la Miséricorde." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Champrosay (Sanatorium de)", lat: 48.66610, lng: 2.42942, ouverture: 1931, fermeture: 1932, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_018.jpg",  legende_image:"", url:"", histoire: "En <b>1931</b>, l'administration générale de l'Assistance publique met en service le 19 avril un sanatorium à Champrosay (commune de Draveil, Essonne), destiné à l'hospitalisation des malades tuberculeux parisiens et de la banlieue." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Chardon-Lagache", lat: 48.84499, lng: 2.26690, ouverture: 1865, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_051.jpg",  legende_image:"L'entrée de la maison de retraite vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/36_Chardon-Lagache.pdf", histoire: "En <b>28</b>, l'Assistance publique – Hôpitaux de Paris acquiert une parcelle issue de l'ancien village d'Auteuil.\n\nEn <b>1861</b>, par acte de donation du 26 mai, les époux Chardon-Lagache fondent une maison de retraite sur cette parcelle.\n\nEn <b>1865</b>, la maison de retraite Chardon-Lagache ouvre ses portes le 24 juillet.\n\nVers <b>1960</b>, intégré au groupe hospitalier Sainte-Périne." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Charles-Foix", lat: 48.80516, lng: 2.39587, ouverture: 1901, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F22FI%2FFRAPHP075_22FI_182.jpg",  legende_image:"Entrée principale en 1976. cote 22/FI/182.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "En <b>1887</b>, l'arrêté préfectoral du 29 octobre attribue à l'établissement la dénomination d'hospice d'Ivry.\n\nEn <b>1912</b>, l'établissement abrite 2 400 lits, et ne cesse de s'agrandir notamment grâce aux fondations Chemin-Delatour et Dheur.\n\nEn <b>1975</b>, renommé hôpital Charles-Foix." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Chemin-Delatour", lat: 48.80536, lng: 2.39587, ouverture: 1900, fermeture: 1916, type: "retraite", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F7%2FFRAPHP075_C660_7_052.jpg",  legende_image:"Plan de masse, 1899, cote C660_7_052.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/41_Chemin-Delatour.pdf", histoire: "En <b>1891</b>, le 30 décembre, le décès de Madame Chemin-Delatour conduit l'Assistance publique, sa légataire universelle, à fonder la maison de retraite qu'elle souhaitait créer dans le département de la Seine. Un site est choisi à Ivry, les travaux confiés successivement aux architectes Vibert et Lebrun." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Cité Universitaire", lat: 48.82016, lng: 2.33498, ouverture: 1941, fermeture: 1945, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/42_Cit%C3%A9-Universitaire.pdf", histoire: "En <b>1941</b>, ouverture le 30 janvier dans les bâtiments de la fondation Deutsch de La Meurthe, boulevard Jourdan dans le 14e arrondissement. L'hôpital temporaire de la Cité universitaire abrite un service de médecine et pallie le manque de lits durant la Seconde Guerre mondiale.\n\nEn <b>1945</b>, fermeture en septembre." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Claude-Bernard", lat: 48.89860, lng: 2.332, ouverture: 1904, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F23FI%2FFRAPHP075_23FI_054.jpg",  legende_image:"Entrée principale en 1963.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/43_Claude-Bernard.pdf", histoire: "Reconstruit au même emplacement d'après les plans de l'architecte François Renaud, reçoit la dénomination d'hôpital Claude-Bernard.\n\nEn <b>1988</b>, rattaché au groupe hospitalier Bichat-Claude-Bernard." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Cochin", lat: 48.83670, lng: 2.33945, ouverture: 1780, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_078.jpg",  legende_image:"Hôpital Cochin. Nouveau pavillon. Aquarelle signée A. Lavieille. Cote 76FI_78", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/45_Cochin.pdf", histoire: "En <b>1780</b>, l'hospice Saint-Jacques-du-Haut-Pas est fondé par Jacques-Denis Cochin pour accueillir les pauvres du faubourg Saint-Jacques à Paris.\n\nEn <b>1782</b>, construit sous la direction de Charles-François Viel, ouvre en juin avec 38 lits.\n\nEn <b>1784</b>, prend le nom d'hospice Cochin. En 1793, change deux fois de dénomination : hospice Jacques, puis hospice du Sud.\n\nEn <b>1802</b>, le conseil général des hospices lui restitue le nom d'hôpital Cochin.\n\nEn <b>1902</b>, fusionne avec l'hôpital Ricord (Cochin-Annexe). Reconstruit et étendu de 1908 à 1926.\n\nEn <b>1999</b>, le groupe hospitalier Cochin fusionne en janvier avec le groupe hospitalier Saint-Vincent-de-Paul – La Roche-Guyon." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Commanderie de Saint-Louis", lat: 48.81058, lng: 2.35390, ouverture: 1634, fermeture: 1656, type: "hopital", detruit:"",  images:"https://www.musee-collections.aphp.fr/scripts/atlasgate.dll/aphpv2db/wa_vignette?ex=312&psite=APHP",  legende_image:"Hôpital Bicêtre, estampe sur  papier. 1656", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bic%C3%AAtre.pdf", histoire: "Au <b>XVIIe siècle</b>, le roi Louis XIII fait l'achat d'une propriété pour y bâtir un hôpital destiné au soin des soldats invalides.\n\nEn <b>1634</b>, la commanderie de Saint-Louis ouvre ses portes." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Corentin-Celton", lat: 48.82817, lng: 2.27850, ouverture: 1863, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F24FI%2FFRAPHP075_24FI_141.jpg",  legende_image:"Entrée principale de l'hôpital en 1994.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/47_Corentin-Celton.pdf", histoire: "En <b>1863</b>, ouverture à Issy de la Maison de retraite des Ménages.\n\nEn <b>1945</b>, la maison de retraite des Ménages est renommée Corentin-Celton." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Cousin de Méricourt et Besson (Hospice )", lat: 48.79915, lng: 2.33215, ouverture: 1913, fermeture: 1972, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/48_Cousin-de-M%C3%A9ricourt-et-Besson.pdf", histoire: "En <b>1913</b>, ouverture de l'hospice Cousin de Méricourt et Besson à Arcueil.\n\nEn <b>1972</b>, rattaché au bureau d'aide sociale de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Damet", lat: 48.88663, lng: 2.32338, ouverture: 1867, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/49_Damet.pdf", histoire: "En <b>29</b>, décès en janvier de Madeleine-Andrée Damet née Desmaisons, dont la demeure rue Lemercier dans le 17e arrondissement devient l'hospice Damet, anciennement dénommé hospice de la Providence.\n\nEn <b>1954</b>, l'hospice compte encore 31 administrées.\n\nEn <b>1955</b>, la fondation Damet s'agrandit par la construction d'un pavillon de 28 chambres, inauguré le 9 juin, destiné aux personnes âgées économiquement défavorisées." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Davaine ", lat: 48.83866, lng: 2.17443, ouverture: 1898, fermeture: 1935, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_046.jpg",  legende_image:"Le pavillon vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/50_Davaine.pdf", histoire: "En <b>1895</b>, décès de Maria-Georgina Davaine née Forbes, qui lègue à l'Assistance publique sa propriété de Garches et une partie de sa fortune pour la fondation d'un asile pour jeunes filles convalescentes.\n\nEn <b>1898</b>, l'établissement ouvre le 25 mai sous le nom de fondation Casimir-Davaine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Debrousse (Hospice)", lat: 48.86195, lng: 2.40625, ouverture: 1892, fermeture: 1972, type: "", detruit:"",  images:"",  legende_image:"", url:"", histoire: "Hospice pour vieillards et femmes dans le 20e arrondissement, 148 rue de Bagnolet, accueillant les indigents de Paris.\n\nEn <b>1972</b>, rattaché au bureau d'aide sociale de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Debrousse (Lyon)", lat: 45.74930, lng: 4.81098, ouverture: 1909, fermeture: 2007, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/51_Debrousse-Lyon.pdf", histoire: "En <b>1909</b>, ouverture de l'asile Debrousse à Lyon, dont la gestion est déléguée par l'AP-HP aux hospices civils de Lyon.\n\nEn <b>2010</b>, vente des terrains et de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Devillas (Hospice )", lat: 48.82785, lng: 2.28056, ouverture: 1863, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/52_Devillas.pdf", histoire: "En <b>1863</b>, La nouvelle fondation dispose de 68 lits. Administré ensuite par l'hôpital Corentin-Celton." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Dheur", lat: 48.80566, lng: 2.39587, ouverture: 1891, fermeture: 1916, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD858%2FFRAPHP075_D_858_0009.jpg",  legende_image:"Fondation Dheur - Vues des bâtiments. Fin XIXe siècle", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/53_Dheur.pdf", histoire: "En <b>1891</b>, la fondation située à Ivry-sur-Seine ouvre le 25 juillet, grâce au legs d'Alexandre-Victor Dheur à l'Assistance publique, destiné à édifier une maison de retraite pour hommes et femmes indigents.\n\nEn <b>1916</b>, rattachée à l'hospice d'Ivry." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Direction des nourrices", lat: 48.86909, lng: 2.35299, ouverture: 1802, fermeture: 1877, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/7_direction-des-nourrices.pdf", histoire: "Avant la création du conseil général des hôpitaux, le placement des nourrices est géré par un directeur placé sous l'autorité du lieutenant de police.\n\nEn <b>1801</b>, par arrêté du 19 avril, le conseil général des hospices hérite de cette mission, confirmée par décret impérial du 30 juin 1806.\n\nEn <b>1877</b>, suppression définitive du service par arrêté préfectoral du 18 janvier." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Domaine", lat: 48.85414, lng: 2.32287, ouverture: 1849, fermeture: null, type: "", detruit:"",  images:"",  legende_image:"", url:"", histoire: "Le Domaine fut dans un premier temps géré par la 3e division de l'administration centrale, puis direction des Affaires domaniales et juridiques avant de prendre le nom de direction des Affaires juridiques. En <b>1992</b>, la direction du Patrimoine et de la logistique se charge de la gestion du Domaine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Dupuytren", lat: 48.67605, lng: 2.41291, ouverture: 1904, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/54_Dupuytren.pdf", histoire: "En <b>1967</b>, l'Assistance publique achève la construction d'un nouvel établissement à Draveil (Essonne), édifié selon les plans de MM. Degouy, Durand et Henry, destiné à l'hospitalisation des malades chroniques. L'hôpital Dupuytren entre progressivement en service dès juillet." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Ecole d’Alembert", lat: 48.87782, lng: 2.73242, ouverture: 1882, fermeture: 1961, type: "ecole", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FALM%2FFRAPHP075_ALM_3FI4_03.jpg",  legende_image:"Vues des bâtiments vers 1959.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/2_dalembert.pdf", histoire: "En <b>1882</b>, le conseil général de la Seine fonde à Montévrain, à 30 kilomètres de Paris, une école professionnelle réservée aux enfants moralement abandonnés puis aux enfants assistés du département de la Seine : l'école d'Alembert." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Ecole d’Yzeure pour jeunes filles ", lat: 46.56211, lng: 3.34609, ouverture: 1885, fermeture: 1918, type: "ecole", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/6_yzeure.pdf", histoire: "En <b>1884</b>, le conseil général de la Seine décide la création d'une école professionnelle pour les jeunes filles des enfants assistés, installée dans un ancien couvent à Yzeure.\n\nEn <b>1887</b>, l'école de réforme ouvre en juin, suivie en septembre 1889 de l'école professionnelle et ménagère.\n\nEn <b>1891</b>, l'école de réforme est transférée en décembre à l'hôpital de la Salpêtrière.\n\nEn <b>1918</b>, le conseil général décide en décembre la liquidation de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Ecole de chirurgie", lat: 48.83867, lng: 2.35440, ouverture: 1833, fermeture: null, type: "ecole", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F86FI%2FFRAPHP075_86FI_079.jpg",  legende_image:"Amphithéâtre d'anatomie en 1983.", url:"https://ageps.aphp.fr/ecoledechirurgie/historique-de-lecole-de-chirurgie/", histoire: "En <b>1832</b>, le Conseil général des hospices fonde le 21 décembre un amphithéâtre d'anatomie sur le terrain de l'ancien cimetière dit de Clamart, dans le 5e arrondissement, afin de mettre fin aux dissections clandestines. Initialement destiné à l'enseignement de l'anatomie aux médecins et élèves médecins de l'Assistance publique.\n\nEn <b>1849</b>, l'amphithéâtre est rattaché à l'Assistance publique, nouvellement créée.\n\nProgressivement, l'établissement s'oriente vers les activités chirurgicales pour devenir une École de chirurgie ouverte aux chirurgiens hospitaliers parisiens.\n\nEn <b>1982</b>, sous la direction du professeur Christian Cabrol, l'ensemble des locaux de l'École de chirurgie est reconstruit.\n\nDepuis <b>1996</b>, la fréquentation des chirurgiens hospitaliers augmente, avec notamment des enseignements de base proposés aux internes nouvellement nommés. L'établissement s'ouvre progressivement aux praticiens des autres régions puis aux chirurgiens étrangers.\n\nEn <b>2021</b>, depuis novembre, le professeur Thierry Bégué assure la direction scientifique de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Ecole des infirmières AP-HP", lat: 48.83947, lng: 2.36584, ouverture: 1907, fermeture: null, type: "ecole", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1907</b>, ouverture de l'école des infirmières de l'AP à la Salpêtrière." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Ecole Le Nôtre ", lat: 48.83392, lng: 2.01471, ouverture: 1882, fermeture: 1958, type: "ecole", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F9%2FFRAPHP075_C660_9_165.jpg",  legende_image:"Les jardins vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/3_le-notre.pdf", histoire: "En <b>1882</b>, fondée par le conseil général de la Seine à Villepreux, l'école professionnelle ouvre le 6 avril pour former à l'horticulture les garçons moralement abandonnés du département.\n\nEn <b>1896</b>, par arrêté préfectoral du 9 mai, prend le nom d'école Le Nôtre, en hommage à André Le Nôtre.\n\nEn <b>1958</b>, transfert à Sonchamp (Yvelines), sur le domaine de Pinceloup.\n\nEn <b>1961</b>, devient un centre éducatif et de formation professionnelle (CEFP)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Emile-Roux", lat: 48.74852, lng: 2.4853, ouverture: 1950, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F26FI%2FFRAPHP075_26FI_254.jpg",  legende_image:"Entrée de l'hôpital en 1993.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/55_Emile-Roux.pdf", histoire: "En <b>1950</b>, le 18 octobre, l'ensemble de l'établissement et des pavillons de Brévannes change de dénomination pour devenir le centre hospitalier Émile-Roux." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Emile-Zola, Médan", lat: 48.95569, lng: 1.99556, ouverture: 1907, fermeture: 1978, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/56_Emile-Zola.pdf", histoire: "En <b>1907</b>, ouverture de la fondation Emile-Zola à Médan.\n\nEn <b>1967</b>, installation des 50 nourrissons dans d'autres locaux.\n\nEn <b>1973</b>, la maison de Médan accueille un musée, puis une école de cadres d'infirmières.\n\nEn <b>1978</b>, l'école fait place au syndicat inter hospitalier régional d'Ile-de-France." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Enfants assistés (Service des)", lat: 48.83679, lng:  2.33444, ouverture: 29, fermeture: 1942, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F81FI%2FFRAPHP075_81FI_07.jpg",  legende_image:"Entrée en 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/1_enfants-assist%C3%A9s.pdf", histoire: "Au début du <b>XIXe siècle</b>, le service des Enfants assistés est installé dans un bâtiment rue d'Enfer, abritant déjà l'hospice des Enfants Trouvés.\n\nVers <b>29</b>, prend le nom d'hospice des Enfants Assistés.\n\nEn <b>1942</b>, renommé Saint-Vincent-de-Paul." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Enfants malades", lat: 48.84636, lng: 2.31588, ouverture: 1724, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FNCK%2FFRAPHP075_NCK_3FI4_0339.jpg",  legende_image:"Entrée historique de l'hôpital des Enfants malades, 149, rue de Sèvres, en 1966.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/57_Enfants-Malades.pdf", histoire: "Au début du <b>XVIIIe siècle (vers 1724)</b>, la Maison de l'Enfant Jésus est fondée rue de Sèvres, à l'initiative du curé de Saint-Sulpice et grâce aux libéralités de plusieurs bienfaitrices, dont la reine Marie Leszczynska. Elle constitue l'origine directe de l'hôpital des Enfants Malades.\n\nL'hôpital des Enfants Malades s'établit à l'emplacement de cette maison, rue de Sèvres, à proximité immédiate de l'hôpital Necker.\n\nEn <b>1927</b>, l'administration générale de l'Assistance publique, contrainte d'appliquer un programme d'économies rigoureuses, tire parti de la proximité des deux structures pour les placer sous une même direction. La fusion s'opère et l'établissement prend le nom de groupe hospitalier Necker-Enfants Malades." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares de l'enfant, hématologie pédiatrique", decouverte_1: "Premier sérum antidiphtérique appliqué à 300 enfants | 1893-1894 | Auguste Chaillou & Louis Martin (sous la direction d'Émile Roux, Institut Pasteur)", decouverte_2: "Première greffe de rein en France | 1952 | Pr Jean Hamburger, Gabriel Richet & Louis Michon", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&RECH_Collectivite_Libel=Enfants+malades+%28h%C3%B4pital%29%7CNecker-Enfants+malades+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=768c3380489a50308dce1cf2cbae998a%7Ce67140e8d2ed60c3d951ce4f6ff56988%7C&type=population", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221096%22&mcpid=1096" },
{ nom: "Enfants-Rouges ", lat: 48.86364, lng: 2.36008, ouverture: 1531, fermeture: 1772, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/58_Enfants-Rouges.pdf", histoire: "En <b>1680</b>, uni à l'Hôpital Général.\n\nEn <b>1772</b>, suppression de l'établissement ; biens et revenus transférés aux Enfants-Trouvés." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Enfants-Trouvés du faubourg Saint-Antoine ", lat: 48.85003, lng: 2.37681, ouverture: 1674, fermeture: 1838, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/59_Enfants-Trouv%C3%A9s-du-faubourg-Saint-Antoine.pdf", histoire: "Dépend de l'Hôpital Général. Consultation des services spéciaux : service des maladies du larynx, nez, oreilles (Dr Lermoyez). Situé rue du Faubourg-Saint-Antoine, entre les numéros 106 et 118, à l'emplacement de l'actuel square Trousseau.\n\nEn <b>1795</b>, réuni à l'Ancien Oratoire de la rue d'Enfer.\n\nEn <b>1801</b>, la maison du faubourg est affectée aux orphelins : hospice des Orphelins de Paris, puis annexe de l'Hôtel-Dieu.\n\nEn <b>1880</b>, devient hôpital Trousseau, puis est désaffecté et démoli. Le square Trousseau occupe désormais son emplacement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Enfants-Trouvés du Parvis", lat: 48.85075, lng: 2.35184, ouverture: 1670, fermeture: 1877, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/60_Enfants-Trouv%C3%A9s-du-Parvis.pdf", histoire: "L'hôpital est fermé sous la Terreur. Le bâtiment accueille ensuite la pharmacie centrale et sert au Bureau central des hôpitaux.\n\nEn <b>1877</b>, démolition de l'édifice." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Européen Georges-Pompidou", lat: 48.83890, lng:  2.27777, ouverture: 2001, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F29FI%2FFRAPHP075_29FI_377.jpg",  legende_image:"Vues extérieures des bâtiments en 2000.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/69_Georges-Pompidou.pdf", histoire: "Dans un premier temps nommé hôpital du 15e.\n\nEn <b>1992</b>, sur proposition du maire de Paris Jacques Chirac, il reçoit la dénomination d'hôpital européen Georges-Pompidou.\n\nEn <b>2001</b>, ouverture de l'établissement." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Fernand Widal", lat: 48.88172, lng: 2.35848, ouverture: 1802, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F27FI%2FFRAPHP075_27FI_244.jpg",  legende_image:"Façade du bâtiment Murger et entrée principale en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/61_Fernand-Widal.pdf", histoire: "Installé dans les bâtiments de la Maison du Saint-Nom-de-Jésus, faubourg Saint-Martin.\n\nEn <b>1816</b>, transféré rue du Faubourg-Saint-Denis dans l'ancienne communauté des sœurs grises, près de la prison Saint-Lazare. Reçoit le titre de Maison royale de Santé, surnommée Maison de Santé Dubois.\n\nEn <b>28</b>, intégralement reconstruit au 200 de la rue du Faubourg-Saint-Denis.\n\nEn <b>1959</b>, renommé hôpital Fernand-Widal." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Foch, Paris", lat: 48.82507, lng: 2.34478, ouverture: 1922, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/62_Foch-Paris.pdf", histoire: "En <b>1921</b>, la vicomtesse de la Retorde donne un immeuble sis 60 rue Vergniaud dans le 13e arrondissement en faveur de la Société des Médaillés Militaires, à l'origine de l'hôpital Foch.\n\nEn <b>1959</b>, l'hôpital Foch devient la maison de retraite Maréchal Foch." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Foch, Suresnes", lat: 48.87079, lng: 2.22240, ouverture: 1932, fermeture: 1950, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/63_Foch-Suresnes.pdf", histoire: "En <b>1929</b>, l'œuvre Foch est reconnue d'utilité publique par décret du 5 décembre.\n\nEn <b>1932</b>, la construction de la fondation Foch débute en avril rue du Mont-Valérien à Suresnes. Elle abrite un service de santé militaire de près de 1 000 lits.\n\nEn <b>1950</b>, cessation d'activité le 1er janvier." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Fondation Boulard ", lat: 48.84445, lng: 2.41497, ouverture: 1830, fermeture: 1972, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD858%2FFRAPHP075_D_858_0011.jpg",  legende_image:"Hospice Saint-Michel (fondation Boulard), Fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/129_Saint-Michel.pdf", histoire: "En <b>1825</b>, par testament olographe du 15 février, Michel-Jacques Boulard lègue à l'administration des hospices civils une somme destinée à fonder une maison de retraite.\n\nEn <b>1830</b>, l'hospice Saint-Michel est inauguré le 24 avril avenue Courteline, à la limite de Saint-Mandé.\n\nEn <b>1874</b>, le legs de Mme Lenoir née Jousseran permet de rétablir les douze lits.\n\nEn <b>1960</b>, l'ensemble compte 239 lits réservés aux personnes âgées.\n\nEn <b>1972</b>, le décret du 30 décembre transfère la tutelle des fondations au bureau d'aide sociale de Paris. Le site accueille le SAMU social de Paris depuis 1996." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Fondation Devillas", lat: 48.84772, lng: 2.32702, ouverture: 1835, fermeture: 1863, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD858%2FFRAPHP075_D_858_0013.jpg",  legende_image:"Bâtiment principal, fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/52_Devillas.pdf", histoire: "En <b>1832</b>, décès du négociant Louis Devillas, dont le legs permet la création de l'hospice.\n\nEn <b>1835</b>, ouverture en juillet dans l'ancien hôtel du donateur, rue du Regard à Paris, avec une capacité de 20 lits.\n\nEn <b>1863</b>, le percement de la rue de Rennes impose son déplacement : l'hospice est transféré à Issy-les-Moulineaux. La nouvelle fondation dispose de 68 lits. Administré ensuite par l'hôpital Corentin-Celton." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Forges-les-Bains", lat: 48.62760, lng: 2.10007, ouverture: 1860, fermeture: 1962, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_082.jpg",  legende_image:"L'hôpital (côté ouest) vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/64_Forges-les-Bains.pdf", histoire: "En <b>24</b>, décision de construire un hôpital à Forges-les-Bains.\n\nEn <b>1860</b>, ouverture de l'établissement.\n\nEn <b>1962</b>, à compter du 1er janvier, l'hôpital de Forges-les-Bains n'est plus géré par l'Assistance publique." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Fortin ", lat: 49.07999, lng: 1.62669, ouverture: 1890, fermeture: null, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_234.jpg",  legende_image:"Vue de la fondation Fortin vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/65_Fortin.pdf", histoire: "En <b>22</b>, l'exécution du legs de Théodore-Marie Fortin d'Ivry est confiée à l'Assistance publique par arrêté du Conseil d'État du 26 juillet.\n\nEn <b>1890</b>, la fondation Fortin ouvre en décembre sur un terrain dépendant de l'hôpital de La Roche-Guyon, accueillant 28 enfants parisiens âgés de 6 à 13 ans.\n\nEn <b>1922</b>, après le départ des religieuses enseignantes, les salles de classe sont remplacées par des chambres d'isolement pour enfants convalescents cardiaques.\n\nEn <b>1971-1973</b>, le pavillon Fortin est transformé pour l'accueil d'enfants handicapés." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Franco-musulman", lat: 48.9097, lng:  2.5009, ouverture: 1935, fermeture: 1979, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1979</b>, l'hôpital franco-musulman devient hôpital Avicenne." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Galien", lat: 48.87896, lng: 2.15315, ouverture: 1927, fermeture: 1972, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/66_Galien.pdf", histoire: "En <b>1921</b>, décès en octobre de Marie-Louise Galien, dont le legs charge l'administration hospitalière parisienne de fonder, mener et gérer un orphelinat de jeunes filles.\n\nEn <b>1924</b>, le décret du 5 décembre autorise l'Assistance publique à accepter le legs Galien, estimé à 12 millions.\n\nEn <b>1925</b>, le service du domaine acquiert une propriété à Croissy-sur-Seine, composée d'un château et d'un parc, destinée à accueillir la fondation.\n\nEn <b>1927</b>, après travaux d'agrandissement et réparations tout au long de 1926, l'établissement ouvre en octobre. Les premières admissions ont lieu en novembre. L'orphelinat, initialement conçu pour 50 enfants, prévoit une capacité progressive portée à 100 administrées. Il abrite 50 lits à l'ouverture.\n\nEn <b>1951</b>, sur les 92 lits budgétaires, 72 sont occupés.\n\nEn <b>1960</b>, la fondation abrite 76 lits réservés aux enfants valides.\n\nFermeture vers <b>1972</b>" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Galignani", lat: 48.88732, lng: 2.27714, ouverture: 1889, fermeture: 1972, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_072.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/67_Galignani.pdf", histoire: "En <b>1972</b>, rattachée au bureau d'aide sociale de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Garage central", lat: 48.84452, lng: 2.31403, ouverture: 1945, fermeture: null, type: "", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1945</b>, installation impasse Ronsin dans le 15e arrondissement, dans des locaux voisins de l'hôpital Necker. Le garage dépend aujourd'hui du service « Sécurité, Maintenance et Services » (SMS), dont les locaux se trouvent à Charenton." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Georges-Clémenceau (Sanatorium)", lat: 48.52092, lng: 2.43166, ouverture: 1918, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F28FI%2FFRAPHP075_28FI_054.jpg",  legende_image:"Entrée de l'hôpital en 1987", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/68_Georges-Clemenceau.pdf", histoire: "En <b>1918</b>, création du sanatorium Georges-Clémenceau, d'abord sous forme de baraquements à Bicêtre.\n\nEn <b>1935</b>, ouverture d'un nouvel établissement à Champcueil, dédié au traitement de la tuberculose.\n\nEn <b>1963</b>, changement d'activité : l'établissement se consacre désormais à la gérontologie." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Gréban de Pontourny", lat: 47.20683, lng: 0.19981, ouverture: 1903, fermeture: 1962, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_170.jpg",  legende_image:"La Façade vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/70_Gr%C3%A9ban-de-Pontourny.pdf", histoire: "En <b>1895</b>, Marie-Alphonse Gréban de Pontourny formule par testament olographe du 26 octobre une donation pour la création d'un asile Saint-Joseph dans le département d'Indre-et-Loire.\n\nEn <b>1903</b>, l'établissement ouvre dans la dernière quinzaine de décembre.\n\nEn <b>1962</b>, rattaché au service d'aide sociale à l'enfance." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hartmann", lat: 48.62984, lng: 2.09274, ouverture: 1892, fermeture: 1935, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_104.jpg",  legende_image:"Vue d'ensemble vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/72_Hartmann.pdf", histoire: "En <b>1887</b>, par décret du 9 août, la Ville de Paris est autorisée à accepter le legs d'Albert Hartmann pour la création d'un orphelinat dénommé fondation Hartmann.\n\nEn <b>1892</b>, l'orphelinat ouvre à Forges-les-Bains.\n\nEn <b>1935</b>, l'établissement ferme provisoirement en raison de difficultés financières." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hendaye (Sanatorium d’)", lat: 43.37596, lng: -1.75985, ouverture: 1899, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F5%2FFRAPHP075_C660_5_144.jpg",  legende_image:"Vues extérieures. - L'entrée de l'hôpital vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/73_Hendaye.pdf", histoire: "En <b>1899</b>, ouverture sous la dénomination « Asile pour enfants de la ville de Paris ».\n\nEn <b>1950</b>, renommé établissement hélio-marin de la ville de Paris.\n\nEn <b>1998</b>, renommé « hôpital marin »." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Henri-Mondor", lat: 48.79804, lng: 2.45182, ouverture: 1969, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F31FI%2FFRAPHP075_31FI_194.jpg",  legende_image:"Entrée de l'hôpital en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/74_Henri-Mondor.pdf", histoire: "En <b>1970</b>, fusionne avec l'hôpital Albert-Chenevier pour former le groupe hospitalier Henri-Mondor – Albert-Chenevier." , groupe: "AP-HP. Hôpitaux Universitaires Henri-Mondor", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hérold", lat: 48.88250, lng: 2.39394, ouverture: 1900, fermeture: 1988, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F4%2FFRAPHP075_C660_4_184.jpg",  legende_image:"La cour d'honneur vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/75_H%C3%A9rold.pdf", histoire: "En <b>1893</b>, l'hôpital de réserve, d'abord nommé hôpital de la place du Danube, reçoit la dénomination d'hôpital Hérold. Voué à l'hospitalisation infantile.\n\nEn <b>1988</b>, fermeture et transfert vers le nouvel hôpital d'enfants Robert-Debré." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hôpital de la Pitié", lat: 48.84353, lng: 2.35467, ouverture: 1809, fermeture: 1912, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_031.jpg",  legende_image:"Bâtiments de l'ancienne Pitié vers 1910.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/107_Pitié.pdf", histoire: "Le <b>1er janvier 1809</b>, une délibération du conseil général des hospices attribue à l'établissement de la rue Lacepède, dans le 5e arrondissement, le nom d'hôpital de la Pitié. Désormais indépendant de l'Hôtel-Dieu, il reçoit des adultes en médecine et chirurgie.\n\nEn <b>1820</b>, l'hôpital gère 433 lits. Ce chiffre monte à 616 en 1840, témoignant d'une activité en forte croissance.\n\nEn <b>1904</b>, face au délabrement croissant des bâtiments, l'Assistance publique décide de reconstruire l'établissement sur des terrains vacants de la Salpêtrière.\n\nEn <b>novembre 1911</b>, la démolition de l'ancienne Pitié est autorisée. Elle devient effective en 1912." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hospice de l’Epée-de-bois", lat: 48.84155, lng: 2.35133, ouverture: 1905, fermeture: 26, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FSerie_Fosseyeux%2F834FOSS%2F834FOSS_091%2FFRAPHP075_834FOSS91_1.jpg",  legende_image:"Dispensaire de la rue de l'Épée-de-Bois, s.d.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Hospice-5e.pdf", histoire: "En <b>20</b>, la maison de secours Sœur-Rosalie est fondée, à l'emplacement de laquelle s'établira l'hospice.\n\nEn <b>26</b>, transfert rue Gracieuse, puis rue de l'Épée-de-Bois en 1862.\n\nEn <b>1903</b>, évacuation de l'ancienne structure hospitalière en mai pour permettre sa reconstruction." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hospice des Sevrés", lat: 48.76846, lng: 2.38957, ouverture: 1884, fermeture: 1962, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/76_Hospice-des-Sevr%C3%A9s.pdf", histoire: "En <b>1883</b>, la maison des Sevrés s'installe dans une ancienne mégisserie acquise par l'administration hospitalière à Thiais.\n\nEn <b>1884</b>, ouverture le 1er janvier. Annexe de l'hospice des Enfants-Assistés, elle accueille des enfants en bonne santé ou atteints d'affections légères, âgés de 18 mois à 10 ans.\n\nEn <b>1900</b>, l'hospice des Sevrés gère 100 lits." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hospitalisation à Domicile", lat: 48.83795, lng: 2.35287, ouverture: 1950, fermeture: null, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/71_HAD.pdf", histoire: "Dans les années <b>1950</b>, l'expérimentation de l'Hospitalisation à domicile débute, afin de permettre le désencombrement de plusieurs hôpitaux parisiens." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hôtel-Dieu", lat: 48.85397, lng:  2.34821, ouverture: 1877, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0024.jpg",  legende_image:"Façade et cour intérieure Fin XIXe siècle. ", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "En <b>1867-1878</b>, reconstruction sous la conduite de l'architecte Diet, sur le côté nord du parvis Notre-Dame.\n\nEn <b>1877</b>, mis en service le 30 juillet, inauguré par Mac-Mahon le 11 août." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hôtel-Dieu (ancien)", lat: 48.85323, lng: 2.34771, ouverture: 829, fermeture: 1878, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FD%2FD807%2FFRAPHP075_D_807_0007.jpg",  legende_image:"Fin XIXe siècle.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2018/11/78_Hotel-Dieu_v1.pdf", histoire: "En <b>829</b> (IXe siècle), fondation de l'Hôtel-Dieu. Jusqu'au début du XVIe siècle, placé sous l'égide du clergé, en partie des chanoines de Notre-Dame.\n\nSous la Révolution, renommé Grand Hospice d'Humanité.\n\nEn <b>1878</b>, démolition de l'ancien Hôtel-Dieu, après la mise en service du nouvel établissement en 1877." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Hôtel-Dieu annexe", lat: 48.84871, lng: 2.37576, ouverture: 1839, fermeture: 1848, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "En <b>1839</b>, l'Hôtel-Dieu annexe entre en service le 2 février.\n\nEn <b>1847</b>, une partie est consacrée aux vieillards sous le nom d'asile Saint-Ferdinand.\n\nEn <b>1848</b>, l'établissement prend le nom de Sainte-Marguerite." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
