{ nom: "Incurables (femmes)", lat: 48.84954, lng: 2.32192, ouverture: 1637, fermeture: 1869, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "En <b>1634-1639</b>, l'hôpital des Incurables est édifié à Paris grâce aux dons du cardinal François de La Rochefoucauld, de l'abbé François Joulet de Châtillon et de Marguerite Rouillé.\n\nEn <b>1637</b>, les lettres patentes de Louis XIII officialisent l'établissement, qui accueille ses premiers malades la même année.\n\nEn <b>1801</b>, les hommes sont transférés dans l'ancien couvent des Récollets, rue du Faubourg-Saint-Martin, puis appelé Incurables-Hommes. La translation d’une partie des malades vers une autre structure conduit à une occupation exclusivement féminine de la maison. Devenu l’hôpital des Incurables-Femmes l’établissement de la rue de Sèvres continue de fonctionner.\n\nEn <b>1869</b>, les patientes quittent à leur tour la maison de la rue de Sèvre pour le nouvel hospices des Incurables construit à Ivry-sur-Seine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Incurables (Hommes)", lat: 48.87547, lng: 2.36029, ouverture: 1801, fermeture: 1869, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_007.jpg",  legende_image:"Plan de l'hospice en 1807.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/38_Charles-Foix.pdf", histoire: "En <b>1801</b>, En possession du couvent des Récollets depuis un décret de 1794, l'administration des hospices le transforme en maison de santé pour infirmes et vieillards appelée hospice des vieillards, hospice du Saint-Nom-de-Jésus. Le transfert des patients auparavant soignés rue de Sèvres lui vaut la dénomination d’Incurables-Hommes.\n\nEn <b>1869</b>, les malades sont réunis dans un nouvel hospice des Incurables construit à Ivry-sur-Seine par Théodore Labrouste.\n\nEn <b>1887</b>, par arrêté du 29 octobre, il prend la dénomination d'hospice d'Ivry. (voir Charles-Foix)" , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Jean-Rostand", lat: 48.81219, lng: 2.37845, ouverture: 1978, fermeture: 2009, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Jean-Rostand.pdf", histoire: "En <b>1974</b>, construction du centre hospitalier privé d'Ivry.\n\nEn <b>1976</b>, fermeture en juin.\n\nEn <b>1978</b>, l'hôpital Jean-Rostand s'y installe.\n\nEn <b>2009</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Jean-Verdier", lat: 48.90957, lng: 2.48790, ouverture: 1920, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F36FI%2FFRAPHP075_36FI_033.jpg",  legende_image:"L'hôpital dans les années 1970.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/80_Jean-Verdier.pdf", histoire: "En <b>1970</b>, ouverture de l'hôpital de Bondy, en Seine-Saint-Denis.\n\nEn <b>1975</b>, renommé hôpital Jean-Verdier en octobre." , groupe: "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Joffre", lat: 48.66597, lng: 2.42872, ouverture: 1932, fermeture: null, type: "sanatorium", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_018.jpg",  legende_image:"Sanatorium Joffre (Champrosay). Vue aérienne. Vers 1935.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Joffre.pdf", histoire: "En <b>1932</b>, d'abord appelé sanatorium de Champrosay, reçoit en mars la dénomination de sanatorium Joffre, en mémoire du maréchal de France Joseph Joffre (22-1931).\n\nEn <b>1967</b>, fusion des hôpitaux Joffre et Dupuytren sous une direction unique : création du groupe hospitalier Joffre-Dupuytren." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "La Collégiale", lat: 48.83889, lng: 2.35235, ouverture: 1986, fermeture: null, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/46_Collégiale.pdf", histoire: "En <b>1977</b>, la création de l'hôpital La Collégiale est décidée dans le cadre d'une politique d'augmentation des capacités de moyen et long séjour à Paris.\n\nEn <b>1980</b>, une consultation architecturale est lancée en mai.\n\nEn <b>1986</b>, les travaux conduits par l'architecte Michel Kalisz s'achèvent et l'établissement ouvre en octobre rue du Fer-à-Moulin (5e arrondissement)." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "La Rochefoucauld", lat: 48.83211, lng: 2.33218, ouverture: 1781, fermeture: 2019, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/87_La-Rochefoucauld.pdf", histoire: "En <b>1781</b>, l'édification de la maison royale de santé débute en juillet, conçue par l'architecte Antoine.\n\nEn <b>1783</b>, les premiers administrés s'y installent en novembre.\n\nEn <b>1822</b>, renommée hospice de La Rochefoucauld.\n\nEn <b>2019</b>, fermeture de l'établissement." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Laennec", lat: 48.84979, lng: 2.32216, ouverture: 1879, fermeture: 2000, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/83_Laennec.pdf", histoire: "Installé dans les bâtiments de l'ancien hôpital des Incurables, fermé après transfert des dernières patientes en <b>1869</b> vers le nouvel hospice des Incurables construit à Ivry.\n\nEn <b>1879</b>, l'hôpital temporaire est renommé Laennec, en mémoire du clinicien anatomo-pathologiste inventeur du stéthoscope.\n\nAprès <b>1998</b>, les activités sont transférées dans l'hôpital européen Georges-Pompidou.\n\nEn <b>2000</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Ledru-Rollin", lat: 48.78995, lng: 2.29231, ouverture: 1942, fermeture: 1961, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/89_Ledru-Rollin.pdf", histoire: "En <b>1892</b>, inauguration à Fontenay-aux-Roses d'un établissement assistant et soignant les femmes à leur sortie de maternité.\n\nEn <b>1942</b>, rattaché à l'AP-HP, l'asile prend le nom de maison maternelle Ledru-Rollin.\n\nEn <b>1962</b>, transfert de l'établissement à la préfecture de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Leprince ", lat: 48.85926, lng: 2.30570, ouverture: 1826, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/91_Leprince.pdf", histoire: "En <b>1819</b>, l'administration hospitalière reçoit l'autorisation, par l'ordonnance royale du 29 décembre, de mettre à profit les revenus de la dotation Leprince à l'édification d'un hospice.\n\nEn <b>1826</b>,  Il ouvre le 1er janvier et dépend de l'administration du bureau de bienfaisance de l'arrondissement.\n\nEn <b>1969</b>, la fondation Leprince est rattaché à l'administration municipale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Lesecq ", lat: 48.87967, lng: 2.35143, ouverture: 1845, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/92_Lesecq.pdf", histoire: "En <b>1781</b>, par testament du 20 février, Simone Lesecq prévoit la création d'un établissement destiné à loger vingt femmes dans sa maison rue du Gros-Chenet.\n\nEn <b>1845</b>, la fondation s'installe rue de Belzunce à Paris. Gérée par le Bureau de bienfaisance, elle accueille gratuitement vingt femmes célibataires ou veuves âgées de plus de cinquante ans." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Magasin central", lat: 48.83880, lng: 2.36631, ouverture: 1867, fermeture: null, type: "", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1867</b>, installation à l'emplacement du cimetière de l'hôpital Salpêtrière.\n\nEn <b>1965</b>, regroupement et transfert à Charenton ; devient « Magasins et ateliers généraux ».\n\nEn <b>1973</b>, renommé « Magasin central hôtelier ».\n\nEn <b>1989</b>, fusion avec la centrale d'approvisionnements alimentaires pour former l'« Approvisionnement central hôtelier et alimentaire », implanté depuis 1993 à Wissous." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Maison de Bicêtre", lat: 48.81112, lng: 2.35573, ouverture: 1656, fermeture: 1823, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_014.jpg",  legende_image:"L'hospital de Bicestre (XVIIe siècle).", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/22_Bic%C3%AAtre.pdf", histoire: "En <b>1656</b>, rattachée à l'Hôpital Général, la Maison de Bicêtre devient un lieu d'enfermement pour les indigents, assumant à la fois la fonction d'un hôpital, d'un asile, d'une maison de correction et d'une maison de détention." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Maison de Moisselles ", lat: 49.05007, lng: 2.33737, ouverture: 1894, fermeture: 1905, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/98_Moisselles.pdf", histoire: "En <b>1892</b>, la propriété de Moisselles est acquise par le département de la Seine pour y installer une école de réforme pour enfants assistés.\n\nEn <b>1894</b>, création d'un service hospitalier de plus de 200 lits destiné aux enfants atteints de teigne.\n\nEn <b>1896</b>, le service est progressivement abandonné.\n\nEn <b>1905</b>, l'établissement devient un asile d'enfants déficients mentaux.\n\nEn <b>1942</b>, rebaptisé hôpital psychiatrique de Moisselles, il prend par la suite le nom de Centre hospitalier Roger-Prévot." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Maison de repos La Bassine", lat: 43.68931, lng: 2.61139, ouverture: 1700, fermeture: 1955, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/03/Bassine.pdf", histoire: "En <b>1946</b>, acquisition par l'Assistance publique d'une propriété de vingt-neuf hectares pour le repos de son personnel masculin \n\nRevendue en <b>1955</b> sans avoir jamais été mise en service." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Maison hospitalière du faubourg Saint-Antoine", lat: 48.84851, lng: 2.37576, ouverture: 1680, fermeture: 1795, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "Dans la seconde moitié du <b>XVIIe siècle</b>, fondation de la maison hospitalière du faubourg Saint-Antoine. Elle abrite des enfants abandonnés sous le nom d'hospice des Enfants-Trouvés du faubourg Saint-Antoine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Maison maternelle", lat: 48.81119, lng: 2.29703, ouverture: 1922, fermeture: 1962, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F60FI%2FFRAPHP075_60FI_02.jpg",  legende_image:"Berceaux en plein air vers 1970.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/40_Ch%C3%A2tillon-sous-Bagneux.pdf", histoire: "En <b>1922</b>, le 9 août, ouverture de la maison maternelle de Châtillon-sous-Bagneux.\n\nEn <b>1962</b>, rattachement au service d'aide sociale à l'enfance." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Manin", lat: 48.87871, lng: 2.37585, ouverture: 1944, fermeture: 1947, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/94_Manin.pdf", histoire: "En <b>1944</b>, la fondation ophtalmologique de la rue Manin (19e arrondissement) est réquisitionnée et gérée dès mai par l'AP. La fondation Rothschild se transforme en un service de chirurgie connu sous la dénomination d'hôpital Manin.\n\nEn <b>1947</b>, fermeture de l'hôpital temporaire." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

{ nom: "Maternité de Port-Royal", lat: 48.83888, lng: 2.33750, ouverture: 1795, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FSerie_Fosseyeux%2F834FOSS%2F834FOSS_070%2FFRAPHP075_834FOSS70_1.jpg",  legende_image:"Hospice de la maternité [1811].", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/95_Maternité_de_Port-Royal.pdf", histoire: "En <b>1793-1794</b>, l'ancienne abbaye de Port-Royal est transformée en lieu de détention sous le nom de prison de Port-Libre ou prison de la Bourbe.\n\nEn <b>1795</b>, la Convention restitue l'établissement à l'administration générale des hospices, affecté aux enfants trouvés. Devient Maison de l'Allaitement.\n\nEn <b>1814</b>, transfert des services d'accouchement de l'Oratoire et de l'École d'accouchement ; prend le nom de Maternité.\n\nEn <b>1890</b>, ouverture de la clinique Baudelocque sur une partie du domaine. Rattachée à Cochin." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Michel-Brézin (fondation)", lat: 48.83865, lng: 2.16881, ouverture: 1833, fermeture: 1946, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_124.jpg",  legende_image:"Cour et arcades de l'ancien hospice de la Reconnaissance vers 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/110_Reconnaissance.pdf", histoire: "En <b>1828</b>, Michel Brézin formule par testament du 16 décembre un legs au Conseil général des hospices afin d'y établir un hospice de retraite à Garches.\n\nEn <b>1946</b>, la fondation Michel-Brézin est annexée à l'hôpital Raymond-Poincaré et devient le pavillon Brézin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Michelet (asile)", lat: 48.82575, lng: 2.34276, ouverture: 1942, fermeture: 1962, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/96_Michelet.pdf", histoire: "En <b>1893</b>, fondation de l'asile Michelet rue de Tolbiac dans le 13e arrondissement.\n\nEn <b>1942</b>, rattaché à l'AP, l'asile prend le nom de maison maternelle Michelet.\n\nEn <b>1962</b>, rattaché au service d'aide sociale à l'enfance." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Millard ", lat: 48.93035, lng: 2.50282, ouverture: 1926, fermeture: 1969, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/97_Millard.pdf", histoire: "En <b>1920</b>, l'Assistance publique est autorisée par décret du 27 décembre à accepter le legs Millard, prévoyant l'édification d'un pavillon pour l'hospitalisation de personnes âgées.\n\nEn <b>1926</b>, ouverture de l'hospice fondation Millard." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée Bourneville", lat: 48.80931, lng: 2.35429, ouverture: 1880, fermeture: 1924, type: "musee", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_037.jpg",  legende_image:"Musée Bourneville vers 1900.", url:"", histoire: "En <b>1880</b>, création du musée d'anatomie pathologique de l'hospice de Bicêtre, dit musée Bourneville." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Musée des Moulages – Saint-Louis", lat: 48.87229, lng: 2.36811, ouverture: 1867, fermeture: null, type: "musee", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1867</b>, création du musée des Moulages de l'hôpital Saint-Louis : collections de moulages reproduisant les principales affectations cutanées et parasitaires, exécutés par le préparateur d'anatomie de l'hôpital, M. Baretta." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Necker", lat: 48.84656, lng: 2.31588, ouverture: 1778, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FNCK%2FFRAPHP075_NCK_3FI4_0315.jpg",  legende_image:"Entrée des urgences enfants, ORL, maternité en 1999.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/99_Necker.pdf", histoire: "En <b>1778</b>, l'hôpital Necker est fondé rue de Sèvres, à l'emplacement de l'ancien couvent des Bénédictines Notre-Dame de Liesse. Il est d'abord nommé hospice de Charité, puis hospice des paroisses de Saint-Sulpice et du Gros-Caillou, et se consacre à la médecine et chirurgie de l'adulte.\n\nEn <b>1792</b>, l'établissement devient l'hospice de l'Ouest.\n\nEn <b>1802</b>, l'administration décide de lui attribuer le nom de sa fondatrice, qui l'a dirigé jusqu'en 1788 : il prend le nom d'hôpital Necker.\n\nEn <b>1927</b>, l'hôpital Necker fusionne avec l'hôpital des Enfants malades pour former l'hôpital Necker-Enfants Malades." , groupe: "AP-HP. Centre-Université Paris Cité", specialites: "Pédiatrie, chirurgie pédiatrique, maladies rares, néphrologie, maladies génétiques", decouverte_1: "Invention du stéthoscope | 1816 | Dr René Laennec", decouverte_2: "Première greffe de rein en France | 1952 | Pr Jean Hamburger & Louis Michon", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&RECH_Collectivite_Libel=Enfants+malades+%28h%C3%B4pital%29%7CNecker-Enfants+malades+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=768c3380489a50308dce1cf2cbae998a%7Ce67140e8d2ed60c3d951ce4f6ff56988%7C&type=population", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221096%22&mcpid=1096" },
{ nom: "Notre-Dame-de-Pitié", lat: 48.84373, lng: 2.35467, ouverture: 1612, fermeture: 1809, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1612</b>, fondée sous la régence de Marie de Médicis, la maison dite Pitié ou Notre-Dame-de-Pitié s'établit faubourg Saint-Victor pour accueillir mendiants et vieillards, en application de l'édit royal du 27 avril 1612.\n\nEn <b>1657</b>, rattaché à l'Hôpital Général, prend par délibération du 7 mai le nom de Notre-Dame-de-Pitié.\n\nEn <b>1792</b>, devient orphelinat Saint-Victor, puis maison de la Patrie sous la Révolution.\n\nEn <b>1803</b>, prend le nom d'hospice des Orphelins.\n\nEn <b>1808</b>, les enfants sont transférés et l'établissement devient annexe de l'Hôtel-Dieu." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Orphelinat Bonar ", lat: 48.85159, lng: 2.34491, ouverture: 1872, fermeture: 1969, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/25_Bonar.pdf", histoire: "En <b>1866</b>, par décret du 28 février, Delphine-Désirée Bonar née Barraud institue la ville de Paris légataire universelle à charge de fonder un orphelinat pour jeunes filles dans le 12e arrondissement.\n\nEn <b>1872</b>, ouverture de l'orphelinat Bonar. L'établissement accueille des orphelines et demi-orphelines pauvres nées à Paris, admises avant l'âge de 6 ans." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Orphelines (hospice des)", lat: 48.84831, lng: 2.37576, ouverture: 1795, fermeture: 1839, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "En <b>1795</b>, les enfants sont transférés et la bâtisse est utilisée pour accueillir les orphelins, prenant successivement les noms d'hospice des Orphelines puis hospice des Orphelins.\n\nEn <b>1839</b>, l'établissement reçoit une nouvelle affectation." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Parent-de-Rosan (Orphelinat)", lat: 48.84286, lng: 2.26674, ouverture: 1895, fermeture: 1962, type: "orphelinat", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/100_Parent-de-Rosan.pdf", histoire: "En <b>1890</b>, décès de Charles-Félix Parent le 8 février, dont le testament prévoyait la création d'un orphelinat.\n\nEn <b>1895</b>, l'orphelinat ouvre ses portes dans la propriété du bienfaiteur dans le 16e arrondissement de Paris, sous le nom de fondation Parent-de-Rosan.\n\nEn <b>1962</b>, à compter du 1er janvier, l'établissement cesse de relever de l'Assistance publique et est rattaché au bureau d'aide sociale à l'enfance." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Brousse", lat: 48.79507, lng: 2.36372, ouverture: 1913, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FPBR%2FFRAPHP075_PBR_3FI4_0278.jpg",  legende_image:"Entrée principale en 1992.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/101_Paul-Brousse.pdf", histoire: "En <b>1913</b>, l'hospice départemental de Villejuif, également appelé hospice départemental Paul-Brousse, entre en service." , groupe: "AP-HP. Université Paris-Saclay", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Doumer", lat: 49.35350, lng: 2.49542, ouverture: 1933, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FVPD%2FFRAPHP075_VPD_3FI4_009.jpg",  legende_image:"Entrée de l'hôpital en 1977.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/102_Paul-Doumer.pdf", histoire: "En <b>1932</b>, le sanatorium Labruyère ouvre.\n\nEn <b>1933</b>, reçoit la dénomination de sanatorium Paul-Doumer." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Manchon", lat: 48.75637, lng: 2.29778, ouverture: 1927, fermeture: 1962, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FPMC%2FFRAPHP075_PMC_3FI4_15.jpg",  legende_image:"Façade côté cour vers 1930.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/103_Paul-Manchon.pdf", histoire: "En <b>1926</b>, le docteur Louis Mourier et le docteur Calmettes initient la création d'un service d'observation pour nouveau-nés abandonnés.\n\nEn <b>1927</b>, la pouponnière ouvre en mars à Antony, en annexe de l'hospice des Enfants-Assistés.\n\nEn <b>1946</b>, renommée pouponnière Paul-Manchon.\n\nEn <b>1962</b>, l'établissement est transféré à la préfecture de Paris et relève du service d'aide sociale à l'enfance à compter du 1er janvier." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Marmottan", lat: 48.87814, lng: 2.29125, ouverture: 1936, fermeture: 1968, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/104_Paul-Marmottan.pdf", histoire: "Construit dans le 17e arrondissement, rue d'Armaillé, pour compenser le déficit de capacité d'hospitalisation dû à la reconstruction de l'hôpital Beaujon à Clichy.\n\nEn <b>1968</b>, l'administration impose la suppression du service de chirurgie. L'établissement cesse définitivement son activité en octobre." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Paul-Parquet ", lat: 48.89332, lng: 2.26303, ouverture: 1923, fermeture: null, type: "fondation", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/105_Paul-Parquet.pdf", histoire: "En <b>1922</b>, la fondation Paul-Parquet est créée en mai par Madame Parquet à Neuilly-sur-Seine. Sa mission : soigner et accueillir des nourrissons.\n\nEn <b>1923</b>, en août, une convention est signée avec l'AP-HP : jusqu'à 50 enfants âgés d'un mois à trois ans peuvent y être accueillis.\n\nEn <b>1943</b>, l'établissement dispose de 60 lits pour ces nourrissons temporairement envoyés par les hôpitaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Petites Maisons (Hospice des)", lat: 48.85155, lng: 2.32604, ouverture: 1554, fermeture: 1863, type: "hopital", detruit:"oui",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_010.jpg",  legende_image:"Plan des Petites-Maisons (Ménages), 1790.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/47_Corentin-Celton.pdf", histoire: "En <b>1554</b>, construction de l'hospice des Petites Maisons à l'emplacement d'une ancienne maladrerie.\n\nEn <b>1801</b>, l'établissement est transformé en maison de retraite et prend le nom d'hospice des Ménages ou Petits-Ménages.\n\nEn <b>1861</b>, Démolition des bâtiments et reconstruction d'un hospice plus vaste à Issy les Moulineaux." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Pharmacie centrale", lat: 48.83920, lng: 2.35532, ouverture: 1795, fermeture: null, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F55FI%2FFRAPHP075_55FI_712.jpg",  legende_image:"Entrée vers 1900.", url:"", histoire: "En <b>1795</b>, organisation de l'apothicairerie générale des hospices civils de Paris le 6 juin, dans l'enceinte de l'Hôtel-Dieu.\n\nEn <b>1796</b>, transférée dans l'ancien hôpital des Enfants-Trouvés du parvis Notre-Dame le 12 novembre ; devient la « pharmacie générale des hospices ».\n\nEn <b>1810</b>, renommée « pharmacie centrale des hôpitaux de Paris », transférée quai de la Tournelle dans la maison des Miramiones.\n\nEn <b>1974</b>, quitte la maison de Miramion." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Piccini (hôpital temporaire)", lat: 48.87378, lng: 2.28569, ouverture: 1941, fermeture: 1945, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/106_Piccini.pdf", histoire: "En <b>1941</b>, la clinique de la rue Piccini dans le 16e arrondissement est réquisitionnée par l'AP durant la guerre.\n\nEn <b>1945</b>, fermeture de l'hôpital temporaire Piccini." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Port-Hallan", lat: 47.34576, lng: -3.15294, ouverture: 1893, fermeture: 1903, type: "ecole", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC661%2F2%2FFRAPHP075_C661_2_077.jpg",  legende_image:"Vue extérieure de l'école vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/4_port-hallan.pdf", histoire: "En <b>1893</b>, l'école maritime de Port-Hallan est fondée par le conseil général de la Seine.\n\nEn <b>1894</b>, ouverture le 14 février à Le Palais. Forme aux métiers maritimes les enfants assistés du département, prévue pour soixante élèves.\n\nEn <b>1903</b>, fermeture de l'établissement, dont les résultats ont été jugés insuffisants." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Raymond-Poincaré", lat: 48.83947, lng:  2.17079, ouverture: 1936, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_244.jpg",  legende_image:"Entrée principale en 1977.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/109_Raymond-Poincaré.pdf", histoire: "En <b>1936</b>, ouverture de l'hôpital-hospice Raymond-Poincaré à Garches, d'abord consacré aux soins des adultes chroniques.\n\nEn <b>1944-1945</b>, transféré temporairement sous le nom d'hôpital Poincaré-Foch en raison d'une réquisition allemande.\n\nAprès <b>1945</b>, changement d'activité : centre de rééducation pour patients de chirurgie osseuse, puis centre de traitement pour personnes atteintes de poliomyélite, avant de s'élargir aux soins des paraplégiques." , groupe: "AP-HP. Université Paris-Saclay", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Reconnaissance (la)", lat: 48.83895, lng: 2.16881, ouverture: 1833, fermeture: 1946, type: "fondation", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F45FI%2FFRAPHP075_45FI_126.jpg",  legende_image:"Arcades dans les années 1960.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/110_Reconnaissance.pdf", histoire: "En <b>1833</b>, l'hospice de la Reconnaissance ouvre en décembre, accueillant environ 140 pensionnaires. Destinée aux ouvriers forgerons-serruriers-mécaniciens sexagénaires sans ressources.\n\nEn <b>1946</b>, les bâtiments sont annexés à l'hôpital Raymond-Poincaré et deviennent le pavillon Brézin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "René-Muret", lat: 48.93596, lng: 2.50974, ouverture: 1937, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRMB%2FFRAPHP075_RMB_3FI4_160.jpg",  legende_image:"Entrée principale en 1967.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/111_René-Muret.pdf", histoire: "En <b>1964</b>, début de l'édification de l'hôpital de Sevran en octobre.\n\nEn <b>1967</b>, l'établissement reçoit par arrêté le nom d'hôpital René-Muret.\n\nEn <b>1970</b>, par arrêté ministériel du 20 août, rattachement de la maison de retraite Bigottini. Les deux établissements sont administrativement liés sous la dénomination d'hôpital René-Muret – Bigottini." , groupe: "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Riboutté-Vitallis (Orphelinat)", lat: 48.62988, lng: 2.09096, ouverture: 1882, fermeture: 1935, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F8%2FFRAPHP075_C660_8_106.jpg",  legende_image:"Entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/112_Riboutt%C3%A9-Vitallis.pdf", histoire: "En <b>1882</b>, l'orphelinat de garçons Riboutté-Vitallis ouvre à Forges-les-Bains. Il accueille des garçons de 7 à 11 ans et leur dispense une instruction élémentaire puis une formation pratique en ateliers.\n\nEn <b>1935</b>, la fondation ferme provisoirement en raison de difficultés financières." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Ricord ", lat: 48.83821, lng: 2.34044, ouverture: 1792, fermeture: 1902, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F1%2FFRAPHP075_C660_1_238.jpg",  legende_image:"Plan de masse de l'hôpital Ricord, 1899 (Rochet, architecte).", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/113_Ricord.pdf", histoire: "En <b>1792</b>, l'ancien couvent des Capucins du faubourg Saint-Jacques est reconverti en hôpital des Vénériens.\n\nEn <b>1836</b>, renommé hôpital du Midi, recentré exclusivement sur le traitement des maladies vénériennes chez l'homme adulte.\n\nEn <b>1893</b>, prend le nom d'hôpital Ricord, en hommage au chirurgien Philippe Ricord.\n\nEn <b>1902</b>, annexé par l'hôpital Cochin.\n\nEn <b>1904</b>, démoli pour permettre l'extension de l'hôpital Cochin." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Robert-Debré", lat: 48.87883, lng: 2.40318, ouverture: 1988, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRDB%2FFRAPHP075_RDB_3FI4_0253.jpg",  legende_image:" Entrée principale, boulevard Sérurier en 1988.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/114_Robert-Debré.pdf", histoire: "Début des années <b >1980</b>, L'administration de l'Assistance publique décide la création d'un nouvel établissement.\n\nEn <b>1984</b>, les travaux débutent dirigés par l'architecte Pierre Riboulet.\n\nEn <b>1988</b>, le 21 mars l'inauguration de l'hôpital Robert-Debré a lieu. " , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Rossini", lat: 48.84622, lng: 2.27022, ouverture: 1889, fermeture: 1967, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/115_Rossini.pdf", histoire: "En <b>1889</b>, inauguration de la fondation Rossini, maison de retraite placée sous la direction du directeur de Sainte-Périne." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Rothschild", lat: 48.84305, lng: 2.39836, ouverture: 1852, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FRTH%2FFRAPHP075_RTH_3FI4_0041.jpg",  legende_image:"Entrée de la fondation Rothschild en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/116_Rothschild.pdf", histoire: "En <b>1852</b>, fondation rue de Picpus dans le 12e arrondissement.\n\nEn <b>1914</b>, transfert et ouverture du nouvel hôpital rue Santerre, comprenant hôpital, hospice, orphelinat, sanatorium et maison de convalescence à Chantilly.\n\nEn <b>1954</b>, rattachement à l'Assistance publique." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Roudil (école)", lat: 36.21721, lng: 2.87913, ouverture: 1887, fermeture: 1962, type: "ecole", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F9%2FFRAPHP075_C660_9_184.jpg",  legende_image:"Cour de la ferme vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/5_roudil.pdf", histoire: "En <b>1887</b>, legs consenti par l'abbé Roudil au département pour la création d'une colonie d'enfants assistés sur un domaine à Ben-Chicao (Algérie), avec ferme-école destinée à l'instruction professionnelle agricole.\n\nEn <b>1893</b>, les travaux s'achèvent en janvier, permettant la mise en exploitation du domaine.\n\nEn <b>1910</b>, l'école Roudil réouvre en avril après réorganisation.\n\nEn <b>1962</b>, fermeture de l'établissement, liée au déclin de la viticulture algérienne." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Antoine", lat: 48.84923, lng: 2.38273, ouverture: 1795, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FSAT%2FFRAPHP075_SAT_3FI4_0136.jpg",  legende_image:"Entrée principale en 1989.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/117_Saint-Antoine.pdf", histoire: "En <b>1795</b>, ouverture sous le nom d'hospice du faubourg Saint-Antoine, puis hospice de l'Humanité du faubourg Saint-Antoine.\n\nEn <b>1796</b>, renommé hospice de l'Est.\n\nEn <b>1802</b>, prend le nom d'hôpital Saint-Antoine." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Anne", lat: 48.82896, lng: 2.33682, ouverture: 1607, fermeture: 1767, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/118_Sainte-Anne.pdf", histoire: "En <b>1607</b>, installation d'une maison de santé chemin de Gentilly, propriété de l'Hôtel-Dieu.\n\nEn <b>1767</b>, Sainte-Anne redevient une ferme lucrative.\n\nEn <b>1861</b>, les terrains sont utilisés pour l'édification de l'asile d'aliénés Sainte-Anne, ouvert en 1867.\n\nEn <b>1872</b>, Sainte-Anne est détachée du domaine de l'AP au profit du ministre de l'Intérieur." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Catherine ", lat: 48.85959, lng: 2.34827, ouverture: 1184, fermeture: 23, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1184</b>, ouverture de l'établissement à l'angle de la rue des Lombards et de la rue Saint-Denis, sous le nom de Sainte-Opportune.\n\nVers <b>1220</b>, prend le nom de Sainte-Catherine.\n\nEn <b>23</b>, démoli lors du percement du boulevard Sébastopol." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Eugénie", lat: 48.84821, lng: 2.37576, ouverture: 24, fermeture: 1901, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "En <b>1880</b>, sur proposition de l'administration, l'hôpital est rebaptisé hôpital Trousseau, pour honorer la mémoire d'Armand Trousseau (1801-1867)." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Marguerite", lat: 48.84861, lng: 2.37576, ouverture: 1848, fermeture: 24, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/05/Armand-Trousseau.pdf", histoire: "En <b>24</b>, l'administration de l'Assistance publique décide de transformer en hôpital pour enfants l'annexe de l'Hôtel-Dieu connue sous le nom d'hôpital Sainte-Marguerite. Le nouvel établissement pédiatrique prend le nom d'hôpital Sainte-Eugénie." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Pélagie ", lat: 48.84232, lng: 2.35285, ouverture: 1681, fermeture: 1792, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/120_Sainte-P%C3%A9lagie.pdf", histoire: "En <b>1681</b>, fondation à Paris de la maison de Sainte-Pélagie, destinée à accueillir des femmes souhaitant se réformer.\n\nEn <b>1792</b>, supprimée à la Révolution, transformée en prison.\n\nEn <b>1793</b>, sert à l'enfermement de prisonniers politiques sous le nom de Prison Sainte-Pélagie.\n\nEn <b>1895</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sainte-Périne", lat: 48.84486, lng: 2.26685, ouverture: 1807, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F47FI%2FFRAPHP075_47FI_166.jpg",  legende_image:"Entrée de l'hôpital, 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/121_Sainte-Périne.pdf", histoire: "En <b>1807</b>, l'institution Notre-Dame de la Paix, implantée rue de Chaillot dans les bâtiments de l'ancien couvent de Sainte-Périne, est intégrée au domaine de l'Assistance publique avec pour mission d'assister les personnes indigentes, anciens fonctionnaires et veuves d'employés.\n\nEn <b>1860</b>, expropriée, ses pensionnaires sont provisoirement hébergés dans la villa de la Réunion, près de l'avenue de Versailles.\n\nEn <b>1865</b>, l'établissement s'installe définitivement rue Chardon-Lagache, dans le quartier d'Auteuil, où il devient un hôpital spécialisé en gérontologie." , groupe: "AP-HP. Université Paris-Saclay", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Esprit-en-Grève", lat: 48.85650, lng: 2.35151, ouverture: 1363, fermeture: 1792, type: "", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/122_Saint-Esprit-en-Gr%C3%A8ve.pdf", histoire: "En <b>1363</b>, installation dans une maison place de Grève ; lieu de secours à l'enfance.\n\nEn <b>1679</b>, absorption de l'administration du Saint-Esprit par l'Hôpital Général.\n\nEn <b>1792</b>, fermeture de l'hospice.\n\nAu <b>XIXe siècle</b>, les bâtiments sont démolis pour être annexés à l'hôtel de ville." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Gervais ", lat: 48.85590, lng: 2.35323, ouverture: 1171, fermeture: 1795, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/123_Saint-Gervais.pdf", histoire: "En <b>1171</b>, l'hôpital Saint-Gervais est fondé par Carin Masson et son fils Harchet, par donation de leur propre maison située sur le parvis de l'église Saint-Gervais. Premier asile de nuit de la capitale, il accueille les vagabonds pour un maximum de trois nuits consécutives.\n\nEn <b>1300</b>, la desserte de l'établissement est confiée aux religieuses de l'ordre de Saint-Augustin, qui remplacent les frères hospitaliers de Saint-Gervais.\n\nVers <b>1657</b>, l'hôpital quitte le parvis Saint-Gervais pour s'installer rue Vieille-du-Temple." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Gervais ", lat: 48.85815, lng: 2.35856, ouverture: 1657, fermeture: 1795, type: "hopital", detruit:"oui",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/123_Saint-Gervais.pdf", histoire: "Vers <b>1657</b>, l'hôpital Saint-Gervais, aussi appelé hôpital Sainte-Anastase, s'installe rue Vieille-du-Temple dans l'hôtel d'O, saisi par les religieuses augustines.\n\nEn <b>1795</b>, la maison hospitalière ferme à la Révolution.\n\nEn <b>1813</b>, le terrain est racheté par la ville de Paris pour l'ouverture des rues des Rosiers et des Francs-Bourgeois." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Jacques-aux-Pèlerins", lat: 48.86451, lng: 2.34614, ouverture: 1319, fermeture: 1795, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/124_Saint-Jacques-aux-P%C3%A8lerins.pdf", histoire: "En <b>1319</b>, fondation par une confrérie de bourgeois parisiens par une charte de Louis X. Situé rue Saint-Denis, d'abord destiné aux pèlerins puis aux mendiants.\n\nÀ la Révolution, l'hôpital Saint-Jacques ferme. L'édifice sert d'abord de magasin.\n\nEn <b>1821</b>, l'administration des hôpitaux et hospices civils procède à sa vente par lots." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Julien-le-Pauvre", lat: 48.85210, lng: 2.34702, ouverture: 1655, fermeture: 1928, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/125_Saint-Julien-le-Pauvre.pdf", histoire: "Église et maisons servant d'hospice pour les pèlerins.\n\nEn <b>1655</b>, vendues aux administrateurs de l'Hôtel-Dieu qui souhaitent en faire un hôpital pour convalescents (projet abandonné).\n\nEn <b>1826</b>, rendue au culte après avoir servi de lieu d'entrepôt durant la Révolution, sert de chapelle à l'Hôtel-Dieu." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Lazare ", lat: 48.87564, lng: 2.35432, ouverture: 1700, fermeture: 1998, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/126_Saint-Lazare.pdf", histoire: "Au <b>XIIe siècle</b>, le site de Saint-Lazare occupe l'emplacement d'une maladrerie destinée au soin des lépreux.\n\nDans la première moitié du <b>XVIIe siècle</b>, l'établissement est confié à Vincent de Paul et à la Congrégation de la Mission.\n\nPendant la Révolution, les bâtiments sont affectés à l'emprisonnement.\n\nEn <b>1811</b>, la prison de Saint-Lazare est placée sous l'autorité du département de la Seine.\n\nEn <b>1824</b>, l'ancien édifice est rasé, puis reconstruit en 1834 pour accueillir une infirmerie spéciale.\n\nEn <b>1955</b>, une partie des lits est cédée à l'AP-HP.\n\nEn <b>1961</b>, l'ensemble des services est intégré au groupe hospitalier Lariboisière – Fernand-Widal – Saint-Lazare.\n\nEn <b>1998</b>, le site est restitué à la Ville de Paris." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Louis", lat: 48.87344, lng: 2.36767, ouverture: 1612, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FCND%2FFRAPHP075_CND_0191_0001.jpg",  legende_image:"Plan du royal et somptueux édifice de l'hospital de St-Louis vers 1681.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/127_Saint-Louis.pdf", histoire: "En <b>1612</b>, fondé sur décision de Henri IV, conçu comme un sanitat rattaché à l'Hôtel-Dieu de Paris, destiné à l'accueil et à l'isolement des personnes atteintes de la peste.\n\nEn <b>1773</b>, reçoit une affectation permanente sous le nom de Saint-Louis.\n\nAu cours du <b>XVIIIe siècle</b>, l'établissement s'oriente vers le traitement des maladies syphilitiques et des affections cutanées.\n\nSous la Révolution, provisoirement rebaptisé hospice du Nord." , groupe: "AP-HP. Nord-Université Paris Cité", specialites: "Hématologie, dermatologie, oncologie, greffes de moelle, maladies infectieuses", decouverte_1: "Système HLA (complexe majeur d'histocompatibilité) | 1958-1965 | Pr Jean Dausset (Prix Nobel de médecine 1980)", decouverte_2: "Première greffe de moelle osseuse à partir de cellules de sang de cordon ombilical | 1988 | Pr Eliane Gluckman", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&type=population&RECH_Collectivite_Libel=Saint-Louis+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=bb26f435be40c2977ac55f4d7ff1dc56%7C", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%221102%22&mcpid=1102" },
{ nom: "Saint-Merry ", lat: 48.85970, lng: 2.35181, ouverture: 1783, fermeture: 1873, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/128_Saint-Merry.pdf", histoire: "En <b>1783</b>, ouverture de l'hospice Saint-Merry, installé dans une maison du cloître Saint-Merry, près de la rue Brisemiche.\n\nEn <b>1873</b>, fermeture de l'hospice." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Saint-Vincent-de-Paul", lat: 48.83699, lng:  2.33444, ouverture: 1814, fermeture: 2011, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F50FI%2FFRAPHP075_50FI_0041.jpg",  legende_image:"L'entrée en 1991.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/130_Saint-Vincent-de-Paul.pdf", histoire: "En <b>1814</b>, l'Oratoire devient le nouvel hospice des Enfants Trouvés.\n\nEn <b>1838</b>, prend le nom d'hospice des Enfants Trouvés et Orphelins.\n\nEn <b>29</b>, renommé hospice des Enfants-Assistés.\n\nEn <b>1942</b>, devient l'hôpital-hospice Saint-Vincent-de-Paul.\n\nEn <b>1971</b>, rejoint le groupe hospitalier Saint-Vincent-de-Paul – La Roche-Guyon.\n\nEn <b>1999</b>, le groupe fusionne avec le groupe hospitalier Cochin.\n\nEn <b>2011</b>, fermeture définitive." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Salpêtrière (Hospice de la)", lat: 48.83891, lng:  2.36727, ouverture: 1657, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F76FI%2FFRAPHP075_76FI_068.jpg",  legende_image:"L'Hôpital de la Salpêtrière, XVIIIe s.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2013/04/131_Salpêtrière.pdf", histoire: "En <b>1657</b>, installée dans le quartier Saint-Victor, lieu d'assistance et refuge pour indigentes et infirmes, en particulier femmes aliénées, hystériques, paralytiques et incurables.\n\nEn <b>1794</b>, apparition des services de neurologie ; l'hôpital se spécialise dans le domaine neuropsychiatrique.\n\nEn <b>1823</b>, renommé hospice de la Vieillesse-Femmes.\n\nEn <b>1885</b>, renommé hospice de la Salpêtrière.\n\nEn <b>1964</b>, fusion avec l'hôpital de la Pitié." , groupe: "AP-HP. Sorbonne Université", specialites: "Neurologie, neuropsychiatrie, psychiatrie (vocation historique femmes)", decouverte_1: "Description de la sclérose en plaques | 1868 | Pr Jean-Martin Charcot & Alfred Vulpian", decouverte_2: "Libération des aliénés de leurs chaînes (réforme psychiatrique) | 1794 | Dr Philippe Pinel", url_archives: "https://aphp-diffusion-prod.ligeo-archives.com/archive/resultats/population/lineaire/n:91?arcfacfull=RECH_Libre&RECH_Collectivite_Libel=Salp%C3%AAtri%C3%A8re+%28h%C3%B4pital+de+la%29%7CPiti%C3%A9-Salp%C3%AAtri%C3%A8re+%28h%C3%B4pital%29%7C&RECH_Collectivite_Md5=3aed04a160b3b0cd584b3fd09fe5da7a%7Cf007940c14f4a8c1afc27b4c97bd3d74%7C&type=population", url_musee: "https://www.musee-collections.aphp.fr/app/photopro.sk/aphp/doclist?prms_treelist=rootNode%3D2%26openNodes%3D%253A3%253A3263%253A381%26caller_id%3Ddoclist%26search%3Dmcpid%2B%253A%2B%25223270%2522&psearch=mcpid%20%3A%20%22193%22&mcpid=193" },
{ nom: "San Salvadour", lat: 43.08465, lng: 6.11162, ouverture: 1905, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FSSL%2FFRAPHP075_SSL_3FI4_067.jpg",  legende_image:"Entrée de l'hôpital en 1993.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/San-Salvadour.pdf", histoire: "En <b>1905</b>, le château est transformé en sanatorium pour enfants.\n\nEn <b>1922</b>, acquisition de la propriété par la ville de Paris.\n\nEn <b>1924</b>, remise à l'Assistance publique.\n\nEn <b>1960</b>, conversion en hôpital destiné aux soins des jeunes polyhandicapés." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sevran", lat: 48.93576, lng: 2.50974, ouverture: 1967, fermeture: 1970, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1967</b>, ouverture de l'hôpital de Sevran, destiné aux malades chroniques. Renommé hôpital René-Muret.\n\nEn <b>1970</b>, rattaché à la maison de retraite Bigottini : devient l'hôpital René-Muret-Bigottini." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Siège Saint Martin", lat: 48.85694, lng: 2.34938, ouverture: 1963, fermeture: 2022, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F51FI%2FFRAPHP075_51FI_14.jpg",  legende_image:"Le bâtiment en 1988.", url:"https://www.calameo.com/read/0040218276a777340cc99", histoire: "En <b>1963</b> L'Assistance Publique se rend propriétaire de l'ïlot Saint-Martin.\n\nEn <b>2022</b>, Fermeture du site, suite à la construction du nouveau siège dans l'enceinte de l'hôpital Saint-Antoine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Siège Saint-Antoine", lat: 48.84761, lng: 2.38282, ouverture: 2022, fermeture: null, type: "", detruit:"",  images:"https://www.aphp.fr/sites/default/files/nvo_siege_2_0.png",  legende_image:"Projection du nouveau siège.", url:"https://www.aphp.fr/espace-medias/liste-ressources-presse/nouveau-siege-de-lap-hp-une-nouvelle-etape-vient-detre", histoire: "En <b>2022</b>, le 13 septembre les premières équipes de l’AP-HP qui travaillaient jusqu’alors avenue Victoria et rue Saint-Martin, rejoignent leurs nouveaux locaux au cœur de l’hôpital Saint-Antoine. " , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Siège Victoria", lat: 48.85666, lng: 2.35027, ouverture: 28, fermeture: 2022, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F51FI%2FFRAPHP075_51FI_03.jpg",  legende_image:"L'entrée en 1992.", url:"https://www.calameo.com/read/0040218276a777340cc99", histoire: "En <b>28</b>, L'Assistance Publique emménage dans un premier bâtiment ouvrant sur l‘avenue Victoria.\n\nEn <b>2022</b>, Fermeture du site, suite à la construction du nouveau siège dans l'enceinte de l'hôpital Saint-Antoine." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Sophie-Déséglise", lat: 48.89410, lng: 2.34971, ouverture: 1910, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Sophie-Deseglise.pdf", histoire: "La fondation Sophie-Déséglise, installée 34 rue du Simplon dans le 18e arrondissement, doit sa création aux bienfaits de Madame Boivin née Déséglise.\n\nEn <b>1910</b>, acte d'acceptation du legs par l'administration.\n\nEn <b>1924</b>, ouverture de l'hospice.\n\nEn <b>1944</b>, la fondation est partiellement détruite par le bombardement aérien du 21 avril." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tarnier", lat: 48.84184, lng: 2.33554, ouverture: 1774, fermeture: null, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F3%2FFRAPHP075_C660_3_265.jpg",  legende_image:"L'entrée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Tarnier.pdf", histoire: "En <b>1796</b>, installation dans le cloître d'un ancien couvent ; prend le nom d'hospice de l'École de Médecine.\n\nSous l'Empire, devient l'hospice clinique de la Faculté de Médecine.\n\nEn <b>1834</b>, l'hôpital des cliniques ouvre.\n\nEn <b>1837</b>, transféré à l'Hôtel-Dieu.\n\nEn <b>1897</b>, la nouvelle structure prend le nom de Clinique Tarnier." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tenon", lat: 48.86594, lng: 2.40098, ouverture: 1878, fermeture: null, type: "hopital", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2F53FI%2FFRAPHP075_53FI_476.jpg",  legende_image:"Entrée principale en 1989.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Tenon.pdf", histoire: "En <b>1878</b>, ouverture dans le 20e arrondissement, d'abord sous le nom d'hôpital de Ménilmontant.\n\nEn <b>1879</b>, renommé hôpital Tenon en hommage au chirurgien Jacques Tenon." , groupe: "AP-HP. Sorbonne Université", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tisserand", lat: 48.83107, lng: 2.31837, ouverture: 1878, fermeture: 1969, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/01/Tisserand.pdf", histoire: "En <b>1878</b>, ouverture de la fondation Tisserand, maison de retraite bâtie rue d'Alésia dans le 14e arrondissement, gérée par le bureau de bienfaisance de l'arrondissement.\n\nEn <b>1969</b>, rattachée à l'administration municipale." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Tournelles", lat: 48.85710, lng: 2.36667, ouverture: 1880, fermeture: 1885, type: "hopital", detruit:"",  images:"",  legende_image:"", url:"", histoire: "En <b>1880</b>, ouverture de l'hôpital des Tournelles.\n\nEn <b>1885</b>, renommé hôpital Andral.\n\nEn <b>1906</b>, l'arrêté préfectoral du 1er mai autorise la désaffectation de l'hôpital Andral. La démolition de l'édifice s'opère courant 1907." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Trinité ", lat: 48.86491, lng: 2.35077, ouverture: 1201, fermeture: 1790, type: "", detruit:"",  images:"",  legende_image:"", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Trinite.pdf", histoire: "D'abord appelé hôpital ou aumônerie de la Croix de la Reine, le refuge pour pèlerins.\n\nEn <b>1207</b>, prend le nom d'hôpital de la Sainte-Trinité.\n\nEn <b>1545</b>, renommé hospice des Enfants-Bleus.\n\nEn <b>1790</b>, suppression de l'hospice." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },
{ nom: "Vallée ", lat: 48.81040, lng: 2.34785, ouverture: 1890, fermeture: 2026, type: "", detruit:"",  images:"https://aphp-diffusion-prod.ligeo-archives.com/cgi-bin/iipsrv.fcgi?FIF=%2Fhome%2Fhttpd%2Faphp%2Fdiffusion%2Fprod%2Fapp%2Fwebroot%2Fdata%2Ffiles%2Faphp.diffusion%2Fimages%2FPHOTOTHEQUE%2FC660%2F6%2FFRAPHP075_C660_6_087.jpg",  legende_image:"Vue de la fondation Vallée vers 1900.", url:"https://blogs.aphp.fr/wp-content/blogs.dir/113/files/2024/06/Vallee.pdf", histoire: "En <b>1847</b>, fondation à Gentilly par Hippolyte Vallée d'un établissement constituant à la fois hospice et école pour l'accueil et l'instruction d'enfants, relevant administrativement de l'hôpital de Bicêtre.\n\nLes bâtiments sont aujourd'hui occupés par le centre de neuropsychiatrie infantile de Gentilly.\n\nEn <b>2026</b>, fermeture en urgence à compter du 27 février par l'Agence régionale de santé." , groupe: "", specialites: "", decouverte_1: "", decouverte_2: "", url_archives: "", url_musee: "" },

const resultsBox = document.getElementById("searchResults");

input.addEventListener("input", () => {
  const q = input.value.trim().toLowerCase(); // texte tapé en minuscules

    resultsBox.style.display = "none";
    return;
  }
  // Filtrage des établissements
  const matches = searchIndex
    .filter(e => e.nom.toLowerCase().includes(q))
    .slice(0, 10); // limite à 10 résultats maximum

  renderResults(matches); // affiche la liste
});
function renderResults(list) {
  resultsBox.innerHTML = "";

  if (!list.length) {
    resultsBox.style.display = "none";
    return;
  }

  list.forEach(e => {
    const div = document.createElement("div");
    div.textContent = e.nom;
    div.className = "search-result";

    div.addEventListener("click", () => selectEtablissement(e));

    resultsBox.appendChild(div);
  });

  resultsBox.style.display = "block";
}

/* =========================
   Filtre statut (légende cliquable)
   ========================= */
let filtreStatut = null; // null = tout afficher | "actif" | "ferme" | "detruit"
// ── Filtre GHU ──────────────────────────────────────────
let filtreGHU = "__avec_groupe__"; // au démarrage : seulement les ets avec GHU

const SEUIL_DISTANCE_GHU_KM = 50; // ← tu peux modifier ce chiffre librement

const COULEURS_GHU = {
  "AP-HP. Nord-Université Paris Cité":                        "#2E7D32",
  "AP-HP. Centre-Université Paris Cité":                      "#66BB6A",
  "AP-HP. Sorbonne Université":                               "#E91E63",
  "AP-HP. Université Paris-Saclay":                           "#FF9800",
  "AP-HP. Hôpitaux Universitaires Henri-Mondor":              "#29B6F6",
  "AP-HP. Hôpitaux Universitaires Paris Seine-Saint-Denis":   "#00BCD4"
};

let lignesGHU = []; // stocke les polylines tracées sur la carte

function distanceKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
            Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) *
            Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function tracerLignesGHU(ghuNom, etablissementsVisibles) {
  // Nettoyer les lignes précédentes
  lignesGHU.forEach(l => map.removeLayer(l));
  lignesGHU = [];

  if (!ghuNom) return;

  const couleur = COULEURS_GHU[ghuNom] || "#888";
  const membres = etablissementsVisibles.filter(e => e.groupe === ghuNom);

  if (membres.length < 2) return;

  // Calcul du centre géographique du GHU
  const latMoy = membres.reduce((s, e) => s + e.lat, 0) / membres.length;
  const lngMoy = membres.reduce((s, e) => s + e.lng, 0) / membres.length;

  // Séparer proches et éloignés
  const proches = membres.filter(e => distanceKm(e.lat, e.lng, latMoy, lngMoy) <= SEUIL_DISTANCE_GHU_KM);

  if (proches.length < 2) return;

  // Trier par longitude pour tracer une chaîne géographique
  proches.sort((a, b) => a.lng - b.lng);

  for (let i = 0; i < proches.length - 1; i++) {
    const ligne = L.polyline(
      [[proches[i].lat, proches[i].lng], [proches[i+1].lat, proches[i+1].lng]],
      { color: couleur, weight: 3, opacity: 0.8 }
    ).addTo(map);
    lignesGHU.push(ligne);
  }
}

   Fonction de filtrage
   ========================= */

function updateMap(yearBegin, year) {
  if (yearBegin === undefined) yearBegin = 829;
  markersLayer.clearLayers();

  // Récupère la valeur du filtre type sélectionné
  const typeSelectionne = document.getElementById("typeFilter")
    ? document.getElementById("typeFilter").value
    : "";

  // Récupère le filtre GHU
  const ghuSelectionne = document.getElementById("ghuFilter")
    ? document.getElementById("ghuFilter").value
    : filtreGHU;
  const ghuActif = ghuSelectionne !== "" ? ghuSelectionne : filtreGHU;

  for (let i = 0; i < etablissements.length; i++) {
    const e = etablissements[i];
    const type = (e.type || "").toLowerCase().trim();
    const ouverture = Number(e.ouverture);
    const fermeture = e.fermeture !== null && e.fermeture !== ""
      ? Number(e.fermeture)
      : Infinity;

    // Filtre par statut (légende cliquable)
    if (filtreStatut !== null) {
      const estDetruit = (e.detruit || "").toLowerCase() === "oui";
      const ouvertureNum = Number(e.ouverture);
      const fermetureNum = e.fermeture !== null && e.fermeture !== "" ? Number(e.fermeture) : Infinity;
      const estFerme = year >= fermetureNum;
      const estActif = !estFerme && !estDetruit;
      if (filtreStatut === "actif"   && !estActif)   continue;
      if (filtreStatut === "ferme"   && (!estFerme || estDetruit)) continue;
      if (filtreStatut === "detruit" && !estDetruit) continue;
    }

// Filtre GHU
    if (ghuActif === "__avec_groupe__" && (!e.groupe || e.groupe.trim() === "")) continue;
    if (ghuActif !== "__avec_groupe__" && ghuActif !== "" && e.groupe !== ghuActif) continue;

    // Filtre par type (comparaison normalisée : sans accent, minuscules)
    if (typeSelectionne !== "") {
      const typeNorm = type
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .toLowerCase().trim();
      const typesConnus = ["hopital", "fondation", "ecole", "musee", "orphelinat", "retraite", "sanatorium"];
      if (typeSelectionne === "autre") {
        if (typesConnus.includes(typeNorm)) continue;
      } else {
        if (typeNorm !== typeSelectionne) continue;
      }
    }

    // Déterminer si l'établissement doit être visible
const ouvert = ouverture <= year && (e.fermeture === null || e.fermeture === "" || Number(e.fermeture) >= yearBegin);
    const ferme = year >= fermeture;

    if (ouvert) {
      let couleur = "blue"; // par défaut : actif

      if (ferme) {
        couleur = "red";
      }

// if (e.type === "musée") { couleur = COULEUR_MUSEE; } // désactivé – discussions en cours

      const marker = createMarker(e, couleur);
      marker.addTo(markersLayer);
      markersIndex[normalize(e.nom)] = marker;
      markersIndex[e.nom.trim().toLowerCase()] = marker;
    }
  }

 const noticeYear = document.getElementById("notice-year");

if (noticeContent) {

      .map(e => `• <strong>${e.nom}</strong>`)
      .join("<br>");
  }
}
// Tracer les lignes GHU si un GHU est sélectionné
  const ghuPourLignes = document.getElementById("ghuFilter")

  updateMap(yearBegin, yearEnd);
});

label.addEventListener("change", () => {

  slider.value = yearEnd;
  updateMap(yearBegin, yearEnd);
});

});
